function ContentCalendar({ selDate, content, onSetContent, view: viewProp, setView: setViewProp }) {
  const [viewLocal, setViewLocal] = useSc("week");
  const view = viewProp !== undefined ? viewProp : viewLocal;
  const setView = setViewProp || setViewLocal;
  // drag state: { fromDate, fromIdx } during a drag; hoverDate during dragover
  const [drag, setDrag] = useSc(null);
  const [hoverDate, setHoverDate] = useSc(null);

  const updatePost = (dk, idx, post) => {
    onSetContent(prev => {
      const arr = (prev[dk] || []).slice();
      arr[idx] = post;
      return { ...prev, [dk]: arr };
    });
  };
  const deletePost = (dk, idx) => {
    onSetContent(prev => {
      const arr = (prev[dk] || []).filter((_, i) => i !== idx);
      const next = { ...prev };
      if (arr.length === 0) delete next[dk]; else next[dk] = arr;
      return next;
    });
  };
  const addPost = (dk, post) => {
    onSetContent(prev => {
      const arr = (prev[dk] || []).slice();
      arr.push(post);
      return { ...prev, [dk]: arr };
    });
  };
  const movePost = (fromDate, fromIdx, toDate) => {
    if (fromDate === toDate) return;
    onSetContent(prev => {
      const fromArr = (prev[fromDate] || []).slice();
      if (!fromArr[fromIdx]) return prev;
      const post = fromArr[fromIdx];
      fromArr.splice(fromIdx, 1);
      const toArr = (prev[toDate] || []).slice();
      toArr.push(post);
      const next = { ...prev };
      if (fromArr.length === 0) delete next[fromDate]; else next[fromDate] = fromArr;
      next[toDate] = toArr;
      return next;
    });
  };

  const todayD = today();

  const handleDragStart = (e, dk, idx) => {
    setDrag({ fromDate: dk, fromIdx: idx });
    try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", `${dk}|${idx}`); } catch (_) {}
  };
  const handleDragEnd = () => { setDrag(null); setHoverDate(null); };
  const handleDragOver = (e, dk) => {
    if (!drag) return;
    e.preventDefault();
    try { e.dataTransfer.dropEffect = "move"; } catch (_) {}
    if (hoverDate !== dk) setHoverDate(dk);
  };
  const handleDragLeave = (e, dk) => {
    if (hoverDate === dk) setHoverDate(null);
  };
  const handleDrop = (e, dk) => {
    e.preventDefault();
    if (!drag) return;
    movePost(drag.fromDate, drag.fromIdx, dk);
    setDrag(null); setHoverDate(null);
  };

  const dragProps = (dk, idx) => ({
    onDragStart: (e) => handleDragStart(e, dk, idx),
    onDragEnd: handleDragEnd,
    dragging: drag && drag.fromDate === dk && drag.fromIdx === idx,
  });
  const dropProps = (dk) => ({
    onDragOver: (e) => handleDragOver(e, dk),
    onDragLeave: (e) => handleDragLeave(e, dk),
    onDrop: (e) => handleDrop(e, dk),
    hover: hoverDate === dk,
  });

  const viewBtn = (key, label) => (
    <button key={key} onClick={() => setView(key)} style={{
      padding:"6px 14px",
      background: view===key ? T.navy : "transparent",
      color: view===key ? "#fff" : T.text,
      border:"none",
      fontSize:11, fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase",
      cursor:"pointer", fontFamily:"inherit",
    }}>{label}</button>
  );

  return (
    <div>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:14, marginBottom:24 }}>
        <div>
          <p style={{ color:T.gold, fontSize:10, letterSpacing:"0.18em", fontWeight:800, marginBottom:8 }}>
            {view === "week" ? `WEEK OF ${startOfWeek(selDate).getDate()} ${MONTHS[startOfWeek(selDate).getMonth()].toUpperCase().slice(0,3)}` : `${MONTHS[selDate.getMonth()].toUpperCase()} ${selDate.getFullYear()}`}
          </p>
          <h1 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:900, fontSize:50, letterSpacing:"-0.025em", lineHeight:0.92, color:T.heading }}>CONTENT CALENDAR</h1>
          <p style={{ color:T.muted, fontSize:13.5, marginTop:8 }}>Click to edit the title or change the type. <strong style={{ color:T.ink }}>Drag any post to another day</strong> to reschedule it.</p>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:0, border:`1px solid ${T.border}`, borderRadius:6, overflow:"hidden" }}>
            {viewBtn("week","Week")}
            {viewBtn("month","Month")}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:20, padding:"10px 14px", background:T.surface, border:`1px solid ${T.border}`, borderRadius:6 }}>
        <span style={{ fontSize:9.5, fontWeight:800, color:T.muted, letterSpacing:"0.14em", marginRight:6, alignSelf:"center" }}>TYPES</span>
        {Object.keys(CONTENT_TYPES).map(t => {
          const tc = CONTENT_TYPES[t];
          return (
            <span key={t} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 9px", background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:3, fontSize:10.5, fontWeight:700, color:T.text }}>
              <span style={{ width:8, height:8, borderRadius:2, background:tc.color }}></span>{t}
            </span>
          );
        })}
      </div>

      {view === "week" ? (
        <ContentWeek selDate={selDate} content={content} todayD={todayD}
          updatePost={updatePost} deletePost={deletePost} addPost={addPost}
          dragProps={dragProps} dropProps={dropProps}/>
      ) : (
        <ContentMonth selDate={selDate} content={content} todayD={todayD}
          updatePost={updatePost} deletePost={deletePost} addPost={addPost}
          dragProps={dragProps} dropProps={dropProps}/>
      )}

      <MonthlyPillarsBar selDate={selDate} content={content}/>
    </div>
  );
}

function MonthlyPillarsBar({ selDate, content }) {
  const year = selDate.getFullYear(), month = selDate.getMonth();
  const counts = {};
  for (const p of MONTHLY_PILLARS) counts[p.id] = 0;
  for (const dk of Object.keys(content)) {
    const m = dk.match(/^(\d{4})-(\d{2})-/);
    if (!m) continue;
    if (parseInt(m[1]) !== year || parseInt(m[2]) !== month + 1) continue;
    for (const post of content[dk]) {
      if (post.pillar && counts.hasOwnProperty(post.pillar)) counts[post.pillar] += 1;
    }
  }
  const doneCount = MONTHLY_PILLARS.filter(p => counts[p.id] >= p.target).length;
  return (
    <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:"18px 22px", marginTop:24 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
        <span style={{ width:4, height:18, background:T.gold }}></span>
        <p style={{ fontWeight:800, fontSize:14, fontFamily:"'ProximaNova Black', sans-serif", letterSpacing:"0.02em", color:T.heading }}>MONTHLY PILLARS</p>
        <span style={{ color:T.muted, fontSize:11 }}>{MONTHS[month]} {year} · auto-tracked from posts</span>
        <span style={{ marginLeft:"auto", fontSize:11, fontWeight:700, color: doneCount === MONTHLY_PILLARS.length ? T.oloka : T.muted, letterSpacing:"0.04em" }}>
          {doneCount}/{MONTHLY_PILLARS.length} complete
        </span>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        {MONTHLY_PILLARS.map(p => {
          const have = counts[p.id];
          const done = have >= p.target;
          return (
            <div key={p.id} style={{
              display:"inline-flex", alignItems:"center", gap:8,
              padding:"6px 12px", borderRadius:4,
              background: done ? p.color + "15" : T.cardBg,
              border:`1px solid ${done ? p.color + "55" : T.border}`,
            }}>
              <span style={{
                width:16, height:16, borderRadius:3, flexShrink:0,
                background: done ? p.color : "transparent",
                border:`1.5px solid ${done ? p.color : T.borderStrong}`,
                display:"flex", alignItems:"center", justifyContent:"center",
                color:"#fff", fontSize:10, fontWeight:900,
              }}>{done && "✓"}</span>
              <span style={{
                fontSize:11.5, color: done ? p.color : T.ink, fontWeight:600,
                textDecoration: done ? "line-through" : "none",
                textDecorationColor: p.color + "99",
              }}>{p.target > 1 ? `${p.target}× ` : ""}{p.label}</span>
              <span style={{
                fontSize:10, fontWeight:800, letterSpacing:"0.04em",
                color: done ? p.color : T.muted,
                background: done ? "transparent" : T.surface2,
                padding:"2px 6px", borderRadius:3, minWidth:30, textAlign:"center",
              }}>{have}/{p.target}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ContentWeek({ selDate, content, todayD, updatePost, deletePost, addPost, dragProps, dropProps }) {
  const today = todayD;
  const monday = startOfWeek(selDate);
  const days = Array.from({ length: 5 }, (_, i) => addDays(monday, i));
  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:14 }}>
      {days.map(d => {
        const dk = isoDate(d);
        const posts = content[dk] || [];
        const isToday = sameDay(d, today);
        const dp = dropProps(dk);
        return (
          <div key={dk}
            onDragOver={dp.onDragOver} onDragLeave={dp.onDragLeave} onDrop={dp.onDrop}
            style={{
              background: dp.hover ? T.surface : T.cardBg, border:`1px solid ${dp.hover ? T.gold : T.border}`,
              borderTop:`3px solid ${isToday ? T.gold : T.borderStrong}`,
              borderRadius:8, padding:"14px 14px 16px",
              minHeight:260, display:"flex", flexDirection:"column",

              transition:"background 0.1s, outline 0.1s",
            }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
              <div>

                <p style={{ fontSize:30, fontWeight:800, fontFamily:"'ProximaNova Black', sans-serif", color: isToday ? T.gold : T.ink, lineHeight:1, letterSpacing:"-0.02em" }}>{d.getDate()}</p>
              </div>
              {isToday && <span style={{ background:T.gold, color:"#fff", fontSize:8.5, fontWeight:800, padding:"3px 7px", borderRadius:3, letterSpacing:"0.1em" }}>TODAY</span>}
            </div>

                );
              })}
              <AddPostForm onAdd={(p) => addPost(dk, p)}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ContentMonth({ selDate, content, todayD, updatePost, deletePost, addPost, dragProps, dropProps }) {
  const today = todayD;
  const year = selDate.getFullYear();
  const month = selDate.getMonth();
  const first = new Date(year, month, 1);
  const start = startOfWeek(first);
  const weeks = [];
  let cur = new Date(start);
  for (let w = 0; w < 6; w++) {
    const row = [];
    for (let d = 0; d < 7; d++) { row.push(new Date(cur)); cur = addDays(cur, 1); }
    weeks.push(row);
  }
  // Modal state: { mode:"new"|"edit", date, idx?, post? }
  const [modal, setModal] = useSc(null);
  return (
    <div style={{ background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden" }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", borderBottom:`1px solid ${T.border}`, background:T.surface }}>
        {CAL_DAYS.map((d, i) => (
          <div key={d} style={{
            padding:"10px 12px", color: (i===5||i===6) ? T.faint : T.muted,
            fontSize:10, fontWeight:800, letterSpacing:"0.14em",
            borderRight: i < 6 ? `1px solid ${T.border}` : "none",
          }}>{d.toUpperCase()}</div>
        ))}
      </div>
      {weeks.map((row, wi) => (
        <div key={wi} style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", borderBottom: wi < 5 ? `1px solid ${T.border}` : "none" }}>
          {row.map((d, di) => {
            const inMonth = d.getMonth() === month;
            const isWeekend = di === 5 || di === 6;
            const dk = isoDate(d);
            const posts = content[dk] || [];
            const isToday = sameDay(d, today);
            const dp = dropProps(dk);
            return (
              <div key={di}
                onDragOver={inMonth ? dp.onDragOver : undefined}
                onDragLeave={inMonth ? dp.onDragLeave : undefined}
                onDrop={inMonth ? dp.onDrop : undefined}
                style={{
                  minHeight:130, padding:"8px 9px",
                  background: dp.hover && inMonth ? T.surface : (!inMonth ? T.surface2 : isWeekend ? T.surface : T.cardBg),
                  borderRight: di < 6 ? `1px solid ${T.border}` : "none",
                  opacity: inMonth ? 1 : 0.6,
                  display:"flex", flexDirection:"column", gap:5,
                  outline: dp.hover && inMonth ? `2px dashed ${T.gold}` : "none", outlineOffset:"-3px",
                  transition:"background 0.1s",
                }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:3 }}>
                  <span style={{
                    fontSize: isToday ? 17 : 14, fontWeight:800,
                    fontFamily:"'ProximaNova Black', sans-serif",
                    color: isToday ? T.gold : isWeekend ? T.faint : T.ink,
                    letterSpacing:"-0.01em",
                  }}>{d.getDate()}{isToday && <span style={{ display:"inline-block", marginLeft:6, width:5, height:5, background:T.gold, borderRadius:"50%", verticalAlign:"middle" }}></span>}</span>
                </div>
                {inMonth && !isWeekend && (
                  <>
                    {posts.map((p, i) => {
                      const tc = CONTENT_TYPES[p.type] || CONTENT_TYPES.Post;
                      const dgp = dragProps(dk, i);
                      return (
                        <div key={i}
                          draggable={true}
                          onDragStart={dgp.onDragStart} onDragEnd={dgp.onDragEnd}
                          onClick={() => setModal({ mode:"edit", date:dk, idx:i, post:p })}
                          style={{
                            background:tc.soft, borderLeft:`3px solid ${tc.color}`,
                            padding:"4px 7px", borderRadius:3,
                            fontSize:10.5, color:T.ink, fontWeight:600, lineHeight:1.3,
                            cursor:"pointer", opacity: dgp.dragging ? 0.4 : 1,
                            position:"relative",
                          }}>
                          <span style={{ fontSize:8.5, color:tc.color, fontWeight:800, letterSpacing:"0.1em", display:"block", marginBottom:1 }}>{p.type.toUpperCase()}</span>
                          {p.title ? (p.title.length > 50 ? p.title.slice(0,50) + "…" : p.title) : <span style={{ color:T.faint, fontStyle:"italic", fontWeight:400 }}>(untitled)</span>}
                          {p.notes && (
                            <span title={p.notes} style={{ position:"absolute", bottom:2, right:18, fontSize:9, color:tc.color, opacity:0.7 }}>📝</span>
                          )}
                          <button onClick={(e) => { e.stopPropagation(); if (confirm("Delete this post?")) deletePost(dk, i); }} title="Delete" style={{
                            position:"absolute", top:2, right:2,
                            width:14, height:14, background:"transparent", border:"none",
                            color:tc.color, opacity:0.5, cursor:"pointer", padding:0,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:11, lineHeight:1,
                          }} onMouseEnter={e => e.currentTarget.style.opacity = "1"} onMouseLeave={e => e.currentTarget.style.opacity = "0.5"}>×</button>
                        </div>
                      );
                    })}
                    <button onClick={() => setModal({ mode:"new", date:dk })} style={{
                      background:"transparent", border:`1px dashed ${T.border}`,
                      color:T.faint, fontSize:10, padding:"2px 4px", borderRadius:3,
                      cursor:"pointer", fontFamily:"inherit", marginTop:2,
                    }}>+ post</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      ))}
      {modal && (
        <PostModal
          post={modal.mode === "edit" ? modal.post : null}
          onClose={() => setModal(null)}
          onSave={(p) => {
            if (modal.mode === "edit") updatePost(modal.date, modal.idx, p);
            else addPost(modal.date, p);
            setModal(null);
          }}
          onDelete={modal.mode === "edit" ? () => { deletePost(modal.date, modal.idx); setModal(null); } : null}
        />
      )}
    </div>
  );
}

// ── Shared modal: full add/edit form (used in Month view) ──
function PostModal({ post, onSave, onClose, onDelete }) {
  const initial = post || { title:"", type:"Post", pillar:null, notes:"" };
  const [title, setTitle] = React.useState(initial.title || "");
  const [type, setType] = React.useState(initial.type || "Post");
  const [pillar, setPillar] = React.useState(initial.pillar || null);
  const [notes, setNotes] = React.useState(initial.notes || "");
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  const submit = () => {
    if (!title.trim()) return;
    const next = { title: title.trim(), type };
    if (pillar) next.pillar = pillar;
    if (notes.trim()) next.notes = notes.trim();
    onSave(next);
  };
  const tc = CONTENT_TYPES[type] || CONTENT_TYPES.Post;

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:1000,
      background:"rgba(15,27,58,0.4)",
      display:"flex", alignItems:"center", justifyContent:"center",
      padding:"32px 16px",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background:T.cardBg, borderRadius:10, width:"100%", maxWidth:520,

        maxHeight:"calc(100vh - 64px)", overflowY:"auto",
      }}>
        <div style={{ padding:"18px 22px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <p style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:14, color:T.heading, letterSpacing:"0.06em" }}>
            {post ? "EDIT POST" : "NEW POST"}
          </p>
          <button onClick={onClose} style={{
            background:"transparent", border:"none", color:T.muted, cursor:"pointer",
            fontSize:18, padding:0, lineHeight:1, fontFamily:"inherit",
          }}>×</button>
        </div>

        <div style={{ padding:"18px 22px" }}>
          <label style={{ display:"block", fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em", marginBottom:5 }}>TITLE</label>
          <input ref={inputRef} value={title} onChange={e => setTitle(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") onClose(); }}
            placeholder="Post title…"
            style={{
              width:"100%", padding:"9px 12px", border:`1px solid ${T.border}`, borderRadius:5,
              fontSize:14, fontFamily:"inherit", color:T.ink, fontWeight:600, outline:"none",
              marginBottom:14,
            }}
          />

          <label style={{ display:"block", fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em", marginBottom:5 }}>POST TYPE</label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:14 }}>
            {Object.keys(CONTENT_TYPES).map(t => {
              const c = CONTENT_TYPES[t];
              const active = type === t;
              return (
                <button key={t} onClick={() => setType(t)} style={{
                  display:"inline-flex", alignItems:"center", gap:5,
                  padding:"5px 10px", borderRadius:3,
                  background: active ? c.color : c.soft,
                  color: active ? "#fff" : c.color,
                  border:`1px solid ${active ? c.color : c.color + "33"}`,
                  fontSize:10, fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase",
                  cursor:"pointer", fontFamily:"inherit",
                }}>
                  <span style={{ width:6, height:6, borderRadius:"50%", background: active ? "#fff" : c.color }}></span>
                  {t}
                </button>
              );
            })}
          </div>

          <label style={{ display:"block", fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em", marginBottom:5 }}>
            MONTHLY PILLAR <span style={{ color:T.faint, fontWeight:600, letterSpacing:0 }}>(optional)</span>
          </label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:14 }}>
            <button onClick={() => setPillar(null)} style={{
              padding:"5px 10px", borderRadius:3,
              background: !pillar ? T.surface2 : "transparent",
              color: T.muted, border:`1px solid ${T.border}`,
              fontSize:10, fontWeight:700, letterSpacing:"0.06em",
              cursor:"pointer", fontFamily:"inherit",
            }}>None</button>
            {MONTHLY_PILLARS.map(p => {
              const active = pillar === p.id;
              return (
                <button key={p.id} onClick={() => setPillar(p.id)} style={{
                  display:"inline-flex", alignItems:"center", gap:5,
                  padding:"5px 10px", borderRadius:3,
                  background: active ? p.color + "20" : "transparent",
                  color: active ? p.color : T.text,
                  border:`1px solid ${active ? p.color + "66" : T.border}`,
                  fontSize:10, fontWeight:700, letterSpacing:"0.06em",
                  cursor:"pointer", fontFamily:"inherit",
                }}>
                  <span style={{ width:7, height:7, borderRadius:2, background:p.color }}></span>
                  {p.label}
                </button>
              );
            })}
          </div>

          <label style={{ display:"block", fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em", marginBottom:5 }}>
            NOTES <span style={{ color:T.faint, fontWeight:600, letterSpacing:0 }}>(optional)</span>
          </label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)}
            rows={3} placeholder="Angle, caption ideas, assets needed…"
            style={{
              width:"100%", padding:"9px 12px", border:`1px solid ${T.border}`, borderRadius:5,
              fontSize:12, fontFamily:"inherit", color:T.ink, outline:"none",
              resize:"vertical", lineHeight:1.4, marginBottom:14, fontStyle:"italic",
            }}
          />
        </div>

        <div style={{ padding:"14px 22px", borderTop:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", background:T.surface }}>
          {post && onDelete ? (
            <button onClick={() => { if (confirm("Delete this post?")) onDelete(); }} style={{
              background:"transparent", color:T.urgent, border:`1px solid ${T.urgent}33`, borderRadius:4,
              padding:"7px 14px", fontSize:11, fontWeight:700, letterSpacing:"0.06em",
              cursor:"pointer", fontFamily:"inherit",
            }}>Delete</button>
          ) : <span></span>}
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose} style={{
              background:"transparent", color:T.muted, border:`1px solid ${T.border}`, borderRadius:4,
              padding:"7px 14px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit",
            }}>Cancel</button>
            <button onClick={submit} style={{
              background: tc.color, color:"#fff", border:"none", borderRadius:4,
              padding:"7px 16px", fontSize:11, fontWeight:800, letterSpacing:"0.08em",
              cursor:"pointer", fontFamily:"inherit",
            }}>{post ? "SAVE" : "ADD POST"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { PostModal });

<script type="text/babel">
// ── Team view: editable staff directory + lunch winners ──
const { useState: useSt, useRef } = React;

const PERSONALITY_COLORS = {
  Red: "#C8261A", Blue: "#1B3F94", Green: "#0E9F6E", Yellow: "#DC9F09",
};
const PERSONALITY_DESC = {
  Red: "Red (fast, direct, results-focused)",
  Blue: "Blue (analytical, precise, quality-focused)",
  Green: "Green (supportive, patient, harmony-seeking)",
  Yellow: "Yellow (enthusiastic, collaborative, idea-driven)",
};
const GENDERS = ["", "Male", "Female", "Other"];

function parsePersonality(p) {
  if (!p) return null;
  const m = p.match(/^(Red|Blue|Green|Yellow)/i);
  return m ? m[1].charAt(0).toUpperCase() + m[1].slice(1).toLowerCase() : null;
}
function fmtDate(s) {
  if (!s) return "";
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) {
    const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
    return d.toLocaleDateString("en-NZ", { day:"numeric", month:"short", year:"numeric" });
  }
  return s;
}
function yearsSince(s) {
  const m = (s || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const start = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  const now = today();
  return Math.floor((now - start) / (1000*60*60*24*365.25));
}

function StaffCard({ staff, idx, onChange, onDelete }) {
  const pcol = parsePersonality(staff.personality);
  const yrs = yearsSince(staff.started);
  const [imgError, setImgError] = useSt(false);
  const fileRef = useRef(null);
  const hasPhoto = staff.photo && !imgError;
  useSt; // keep linter happy

  const pickPhoto = () => fileRef.current && fileRef.current.click();
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        // Resize so largest side = 256
        const MAX = 256;
        const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * ratio));
        const h = Math.max(1, Math.round(img.height * ratio));
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = c.toDataURL("image/jpeg", 0.82);
        setImgError(false);
        onChange({ ...staff, photo: dataUrl });
      };
      img.onerror = () => alert("Couldn't read that image.");
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };
  const clearPhoto = (e) => {
    e.stopPropagation();
    if (!confirm("Remove this photo?")) return;
    setImgError(false);
    onChange({ ...staff, photo: "" });
  };
  return (
    <div style={{
      background:T.cardBg, border:`1px solid ${T.border}`,
      borderRadius:8, padding:"14px 16px",
      display:"flex", flexDirection:"column", gap:8,
      position:"relative",
    }}>
      <div style={{ position:"absolute", top:10, right:10 }}>
        <DeleteBtn onClick={onDelete}/>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:11, paddingRight:30 }}>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }}/>
        <div onClick={pickPhoto} title="Click to change photo" style={{
          position:"relative", width:48, height:48, borderRadius:"50%", flexShrink:0,
          cursor:"pointer", overflow:"hidden",
          border: `2px solid ${pcol ? PERSONALITY_COLORS[pcol] : T.borderStrong}`,
          background: pcol ? PERSONALITY_COLORS[pcol]+"20" : T.surface,
        }}>
          {hasPhoto ? (
            <img src={staff.photo} alt={staff.name}
              onError={() => setImgError(true)}
              style={{
                width:"100%", height:"100%",
                objectFit:"cover", objectPosition:"center 20%",
                display:"block",
              }}
            />
          ) : (
            <div style={{
              width:"100%", height:"100%",
              display:"flex", alignItems:"center", justifyContent:"center",
              color: pcol ? PERSONALITY_COLORS[pcol] : T.muted,
              fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:18,
            }}>{(staff.name || "?")[0].toUpperCase()}</div>
          )}
          {/* Hover overlay */}
          <div className="photo-overlay" style={{
            position:"absolute", inset:0,
            background:"rgba(15,27,58,0.55)",
            display:"flex", alignItems:"center", justifyContent:"center",
            color:"#fff", fontSize:8.5, fontWeight:800, letterSpacing:"0.1em",
            opacity:0, transition:"opacity 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = 1}
          onMouseLeave={e => e.currentTarget.style.opacity = 0}
          >
            CHANGE
          </div>
          {hasPhoto && (
            <button onClick={clearPhoto} title="Remove photo" style={{
              position:"absolute", top:-2, right:-2, width:18, height:18, borderRadius:"50%",
              background:T.cardBg, border:`1px solid ${T.urgent}`, color:T.urgent,
              cursor:"pointer", fontSize:11, lineHeight:1, padding:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"inherit", fontWeight:800,
            }}>×</button>
          )}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontSize:14, fontWeight:800, color:T.ink, fontFamily:"'ProximaNova Black', sans-serif", letterSpacing:"0.01em" }}>

  }]);

  const updateLunch = (i, patch) => setLunches(prev => prev.map((l, idx) => idx === i ? { ...l, ...patch } : l));
  const delLunch = (i) => setLunches(prev => prev.filter((_, idx) => idx !== i));
  const addLunch = () => setLunches(prev => [...prev, { name:"", date: new Date().toISOString().slice(0,10) }]);

  const filtered = staff.map((s, i) => ({ s, i })).filter(({ s }) => {
    if (filter === "All") return true;
    return (s.gender || "").toLowerCase() === filter.toLowerCase();
  });

  // Upcoming birthdays
  const todayD = today();
  const upcoming = [];
  for (const s of staff) {

    const month = parseInt(m[1]), day = parseInt(m[2]);

    upcoming.push({ ...s, nextBday: next, daysAway: Math.ceil((next - todayD) / (1000*60*60*24)) });

                  </p>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Staff grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:12 }}>
        {filtered.map(({ s, i }) => (

        <button onClick={addStaff} style={{

// ── Ideas (editable, with modal for notes/files/images) ──
function IdeasPanel({ ideas, setIdeas, onAddToTasks }) {

  const norm = (raw) => {
    if (raw && typeof raw === "object") return { text: raw.text || "", notes: raw.notes || "", files: raw.files || [], images: raw.images || [] };
    return { text: String(raw || ""), notes: "", files: [], images: [] };
  };

  const update = (kind, idx, patch) => setIdeas(prev => ({
    ...prev,
    [kind]: prev[kind].map((v, i) => i === idx ? { ...norm(v), ...patch } : v),
  }));
  const updateText = (kind, idx, text) => update(kind, idx, { text });
  const del = (kind, idx) => setIdeas(prev => ({ ...prev, [kind]: prev[kind].filter((_, i) => i !== idx) }));
  const add = (kind) => setIdeas(prev => ({ ...prev, [kind]: [...prev[kind], { text: "", notes: "", files: [], images: [] }] }));

  const renderList = (kind, title, color) => (

              cursor:"pointer", transition:"box-shadow 0.15s",
            }}
              onClick={() => setOpen({ kind, idx: i })}
              onMouseEnter={e => e.currentTarget.style.boxShadow = `0 4px 14px ${color}25`}
              onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}
            >
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:12.5, color:T.ink, lineHeight:1.45, fontWeight:500 }}>
                  {idea.text || <span style={{ color:T.faint, fontStyle:"italic", fontWeight:400 }}>New idea — click to edit…</span>}

                {hasExtras && (
                  <div style={{ display:"flex", gap:6, marginTop:6, flexWrap:"wrap" }}>

                      <span style={{ fontSize:9.5, fontWeight:700, color:T.muted, background:T.surface2, padding:"2px 6px", borderRadius:3, letterSpacing:"0.04em" }}>📝 NOTES</span>
                    )}
                    {idea.images && idea.images.length > 0 && (
                      <span style={{ fontSize:9.5, fontWeight:700, color:color, background:color + "15", padding:"2px 6px", borderRadius:3, letterSpacing:"0.04em" }}>🖼 {idea.images.length}</span>
                    )}
                    {idea.files && idea.files.length > 0 && (
                      <span style={{ fontSize:9.5, fontWeight:700, color:T.muted, background:T.surface2, padding:"2px 6px", borderRadius:3, letterSpacing:"0.04em" }}>📎 {idea.files.length}</span>

function IdeaModal({ idea, color, onChange, onClose, onDelete }) {
  const imgRef = React.useRef(null);
  const fileRef = React.useRef(null);

  const onImageFile = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const readers = files.map(file => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 900;
          const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * ratio));
          const h = Math.max(1, Math.round(img.height * ratio));
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          c.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", 0.82));
        };
        img.onerror = () => resolve(null);
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }));
    Promise.all(readers).then(urls => {
      const valid = urls.filter(Boolean);
      onChange({ images: [...(idea.images || []), ...valid] });
    });
    e.target.value = "";
  };
  const removeImage = (ix) => {
    if (!confirm("Remove this image?")) return;
    onChange({ images: (idea.images || []).filter((_, i) => i !== ix) });
  };
  const onAnyFiles = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const readers = files.map(f => new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve({ name: f.name, type: f.type || "application/octet-stream", size: f.size, data: r.result });
      r.readAsDataURL(f);
    }));
    Promise.all(readers).then(items => {
      onChange({ files: [...(idea.files || []), ...items] });
    });
    e.target.value = "";
  };
  const removeFile = (fi) => {
    onChange({ files: (idea.files || []).filter((_, i) => i !== fi) });
  };
  const fmtBytes = (n) => n < 1024 ? `${n} B` : n < 1024*1024 ? `${(n/1024).toFixed(0)} KB` : `${(n/(1024*1024)).toFixed(1)} MB`;
  const fileIcon = (mime) => /pdf/i.test(mime) ? "📄" : /image/i.test(mime) ? "🖼" : /word|document/i.test(mime) ? "📝" : /sheet|excel/i.test(mime) ? "📊" : "📎";

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:1000,
      background:"rgba(15,27,58,0.4)",
      display:"flex", alignItems:"center", justifyContent:"center",
      padding:"32px 16px",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:T.cardBg, borderRadius:10, width:"100%", maxWidth:640,
        boxShadow:"0 24px 60px rgba(15,27,58,0.35)",
        borderTop:`4px solid ${color}`,
        maxHeight:"calc(100vh - 64px)", overflowY:"auto",
      }}>
        <div style={{ padding:"16px 22px 14px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <p style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:13, color:T.heading, letterSpacing:"0.06em" }}>IDEA</p>
          <button onClick={onClose} style={{
            background:"transparent", border:"none", color:T.muted, cursor:"pointer",
            fontSize:18, padding:0, lineHeight:1, fontFamily:"inherit",
          }}>×</button>
        </div>

        <div style={{ padding:"18px 22px" }}>
          <label style={{ display:"block", fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em", marginBottom:5 }}>IDEA</label>
          <textarea value={idea.text} onChange={e => onChange({ text: e.target.value })}
            rows={2} placeholder="Describe the idea…"
            style={{

// ── Suppliers (editable) ──
function SuppliersPanel({ suppliers, setSuppliers }) {
  const typeColors = {
    PRINT:T.navy, MERCH:T.gold, UNIFORM:T.vanja, "BRANDED ITEMS":T.oloka, "PROMO ITEM":T.urgent, OTHER:T.muted,
  };
  const types = ["PRINT","MERCH","UNIFORM","BRANDED ITEMS","PROMO ITEM","OTHER"];
  const update = (i, key, val) => setSuppliers(prev => prev.map((s, idx) => idx===i ? { ...s, [key]: val } : s));
  const del = (i) => setSuppliers(prev => prev.filter((_, idx) => idx!==i));
  const add = (type) => setSuppliers(prev => [...prev, {
    type, product:"", company:"", contact:"", company2:"", contact2:"", notes:"", image:"", files:[],
  }]);

  const groups = {};
  for (let i = 0; i < suppliers.length; i++) {
    const t = (suppliers[i].type || "OTHER").trim();
    if (!groups[t]) groups[t] = [];
    groups[t].push({ s: suppliers[i], idx: i });
  }
  const allTypes = Array.from(new Set([...types, ...Object.keys(groups)]));

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
      {allTypes.map(type => {
        const list = groups[type] || [];
        const col = typeColors[type] || T.muted;
        return (
          <div key={type}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
              <span style={{ width:4, height:16, background:col }}></span>
              <h2 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:14, color:T.heading, letterSpacing:"0.1em" }}>{type}</h2>
              <span style={{ color:T.muted, fontSize:11 }}>· {list.length}</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))", gap:10 }}>
              {list.map(({s, idx}) => (
                <SupplierCard key={idx} s={s} idx={idx} col={col} allTypes={allTypes}
                  update={update} del={del}/>
              ))}
              <div style={{ gridColumn:"1 / -1" }}>
                <AddRowBtn label={`Add ${type.toLowerCase()} supplier`} onClick={() => add(type)}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SupplierCard({ s, idx, col, allTypes, update, del }) {
  const imgInputRef = useSr(null);
  const fileInputRef = useSr(null);
  // Use React refs (useSr is just useState alias — need real refs)
  const refImg = React.useRef(null);
  const refFile = React.useRef(null);

  const onImageFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * ratio));
        const h = Math.max(1, Math.round(img.height * ratio));
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        update(idx, "image", c.toDataURL("image/jpeg", 0.8));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };
  const onAnyFiles = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const readers = files.map(f => new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve({ name: f.name, type: f.type || "application/octet-stream", size: f.size, data: r.result });
      r.readAsDataURL(f);
    }));
    Promise.all(readers).then(items => {
      update(idx, "files", [...(s.files || []), ...items]);
    });
    e.target.value = "";
  };
  const removeFile = (fi) => {
    const next = (s.files || []).filter((_, i) => i !== fi);
    update(idx, "files", next);
  };
  const removeImage = () => {
    if (confirm("Remove this image?")) update(idx, "image", "");
  };

  const fmtBytes = (n) => n < 1024 ? `${n} B` : n < 1024*1024 ? `${(n/1024).toFixed(0)} KB` : `${(n/(1024*1024)).toFixed(1)} MB`;
  const fileIcon = (mime) => {
    if (/pdf/i.test(mime)) return "📄";
    if (/image/i.test(mime)) return "🖼";
    if (/word|document/i.test(mime)) return "📝";
    if (/sheet|excel/i.test(mime)) return "📊";
    return "📎";
  };

  return (
    <div style={{ background:T.cardBg, border:`1px solid ${T.border}`, borderLeft:`3px solid ${col}`, borderRadius:6, padding:"12px 14px", position:"relative" }}>
      <div style={{ position:"absolute", top:9, right:9 }}>
        <DeleteBtn onClick={() => del(idx)}/>
      </div>

      {/* Image */}
      <input ref={refImg} type="file" accept="image/*" onChange={onImageFile} style={{ display:"none" }}/>
      {s.image ? (
        <div style={{ position:"relative", marginBottom:10 }}>
          <img src={s.image} alt={s.product || "supplier image"}
            onClick={() => refImg.current && refImg.current.click()}
            style={{
              display:"block", width:"100%", height:140, objectFit:"cover",
              borderRadius:4, cursor:"pointer", border:`1px solid ${T.border}`,
            }}
            title="Click to change image"
          />
          <button onClick={removeImage} title="Remove image" style={{
            position:"absolute", top:6, right:6,
            width:22, height:22, borderRadius:"50%",
            background:"rgba(0,0,0,0.55)", color:"#fff",
            border:"none", cursor:"pointer", padding:0,
            display:"flex", alignItems:"center", justifyContent:"center",
            fontFamily:"inherit", fontSize:13, lineHeight:1,
          }}>×</button>
        </div>
      ) : (
        <button onClick={() => refImg.current && refImg.current.click()} style={{
          width:"100%", padding:"14px 10px", marginBottom:10,
          background:T.surface, border:`1px dashed ${T.borderStrong}`,
          borderRadius:4, color:T.muted, fontSize:11, cursor:"pointer",
          fontFamily:"inherit", fontWeight:600, letterSpacing:"0.04em",
          display:"flex", alignItems:"center", justifyContent:"center", gap:7,
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor = T.gold; e.currentTarget.style.color = T.gold; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor = T.borderStrong; e.currentTarget.style.color = T.muted; }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21,15 16,10 5,21"/>
          </svg>
          ADD IMAGE
        </button>
      )}

      <p style={{ fontSize:13, fontWeight:800, color:T.ink, marginBottom:7, paddingRight:30 }}>
        <EditableText value={s.product} onChange={v => update(idx, "product", v)} placeholder="Product…"
          style={{ fontSize:13, fontWeight:800, color:T.ink }}/>
      </p>
      <div style={{ marginBottom:6 }}>
        <p style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:"0.06em", marginBottom:2 }}>SUPPLIER</p>
        <EditableText value={s.company} onChange={v => update(idx, "company", v)} placeholder="Company name"
          style={{ fontSize:12, color:T.text, fontWeight:600 }}/>
      </div>
      <div style={{ marginBottom:6 }}>
        <p style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:"0.06em", marginBottom:2 }}>CONTACT</p>
        <EditableText value={s.contact} onChange={v => update(idx, "contact", v)} placeholder="Name + email"
          style={{ fontSize:11, color:T.text, wordBreak:"break-word", display:"block" }}/>
      </div>
      {(s.company2 || s.contact2) && (
        <div style={{ marginBottom:6, paddingTop:6, borderTop:`1px dashed ${T.border}` }}>
          <p style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:"0.06em", marginBottom:2 }}>ALT SUPPLIER</p>
          <EditableText value={s.company2 || ""} onChange={v => update(idx, "company2", v)} placeholder="Alt company"
            style={{ fontSize:12, color:T.text, fontWeight:600 }}/>
          <EditableText value={s.contact2 || ""} onChange={v => update(idx, "contact2", v)} placeholder="Alt contact"
            style={{ fontSize:11, color:T.muted, display:"block", marginTop:2, wordBreak:"break-word" }}/>
        </div>
      )}

      {/* Notes */}
      <div style={{ marginTop:8, padding:"6px 9px", background:T.surface, borderRadius:4 }}>
        <p style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:"0.06em", marginBottom:2 }}>NOTES</p>
        <EditableText value={s.notes || ""} onChange={v => update(idx, "notes", v)} multiline placeholder="Add notes…"
          style={{ fontSize:11, color:T.text, fontStyle:"italic", lineHeight:1.4 }}/>
      </div>

      {/* Files */}
      <div style={{ marginTop:8, padding:"6px 9px", background:T.surface, borderRadius:4 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
          <p style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:"0.06em" }}>
            FILES{(s.files && s.files.length) ? ` · ${s.files.length}` : ""}
          </p>
          <input ref={refFile} type="file" multiple onChange={onAnyFiles} style={{ display:"none" }}/>
          <button onClick={() => refFile.current && refFile.current.click()} style={{
            background:"transparent", border:`1px solid ${T.border}`, borderRadius:3,
            color:T.muted, fontSize:9, fontWeight:800, letterSpacing:"0.08em",
            padding:"2px 7px", cursor:"pointer", fontFamily:"inherit",
          }}
          onMouseEnter={e => { e.currentTarget.style.color = T.gold; e.currentTarget.style.borderColor = T.gold; }}
          onMouseLeave={e => { e.currentTarget.style.color = T.muted; e.currentTarget.style.borderColor = T.border; }}
          >+ ADD</button>
        </div>
        {(s.files && s.files.length > 0) ? (
          <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
            {s.files.map((f, fi) => (
              <div key={fi} style={{
                display:"flex", alignItems:"center", gap:6,
                background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:3,
                padding:"4px 7px",
              }}>
                <span style={{ fontSize:13 }}>{fileIcon(f.type)}</span>
                <a href={f.data} download={f.name} style={{
                  flex:1, fontSize:11, color:T.ink, fontWeight:600,
                  textDecoration:"none", overflow:"hidden", textOverflow:"ellipsis",
                  whiteSpace:"nowrap", cursor:"pointer",
                }} title={f.name}>{f.name}</a>
                <span style={{ fontSize:9.5, color:T.muted, fontWeight:700 }}>{fmtBytes(f.size)}</span>
                <button onClick={() => removeFile(fi)} title="Remove" style={{
                  background:"transparent", border:"none", color:T.faint,
                  cursor:"pointer", padding:0, fontSize:13, lineHeight:1, marginLeft:2,
                }}
                onMouseEnter={e => e.currentTarget.style.color = T.urgent}
                onMouseLeave={e => e.currentTarget.style.color = T.faint}
                >×</button>
              </div>
            ))}
          </div>
        ) : (
          <p style={{ fontSize:10.5, color:T.faint, fontStyle:"italic" }}>No files attached.</p>
        )}
      </div>

      <div style={{ marginTop:8 }}>
        <select value={s.type} onChange={e => update(idx, "type", e.target.value)} style={{
          fontSize:10, color:T.muted, background:T.cardBg, border:`1px solid ${T.border}`,
          borderRadius:3, padding:"3px 6px", fontFamily:"inherit", letterSpacing:"0.06em",
        }}>
          {allTypes.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      </div>
    </div>
  );
}

// ── Budget (editable annual targets + monthly tables) ──
function BudgetPanel({ budget, setBudget }) {
  const formatMoney = n => "$" + Math.round(n).toLocaleString("en-NZ");

  const updateAnnual = (i, key, val) => setBudget(prev => ({ ...prev, annual: prev.annual.map((a,idx) => idx===i ? { ...a, [key]: val } : a) }));
  const delAnnual = (i) => setBudget(prev => ({ ...prev, annual: prev.annual.filter((_,idx) => idx!==i) }));
  const addAnnual = () => setBudget(prev => ({ ...prev, annual: [...prev.annual, { label:"New line item", amount:0 }] }));

  const updateRow = (which, i, key, val) => setBudget(prev => ({ ...prev, [which]: prev[which].map((r,idx) => idx===i ? { ...r, [key]: val } : r) }));
  const updateRowCell = (which, i, ci, val) => setBudget(prev => ({
    ...prev,
    [which]: prev[which].map((r, idx) => idx===i ? { ...r, values: r.values.map((v, vi) => vi===ci ? val : v) } : r)
  }));
  const delRow = (which, i) => setBudget(prev => ({ ...prev, [which]: prev[which].filter((_,idx) => idx!==i) }));
  const addRow = (which, monthCount) => setBudget(prev => ({ ...prev, [which]: [...prev[which], { label:"New line", values:Array(monthCount).fill(0) }] }));

  const renderTable = (which, monthLabels, headerColor, sectionTitle) => (
    <div style={{ marginBottom:24 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <span style={{ width:4, height:16, background:headerColor }}></span>
        <h2 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:14, color:T.heading, letterSpacing:"0.1em" }}>{sectionTitle}</h2>
      </div>
      <div style={{ overflowX:"auto", background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8 }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11.5 }}>
          <thead>
            <tr style={{ background:T.surface, borderBottom:`1px solid ${T.border}` }}>
              <th style={{ textAlign:"left", padding:"10px 14px", fontSize:10, fontWeight:800, color:T.muted, letterSpacing:"0.1em", width:230 }}>LINE ITEM</th>
              {monthLabels.map((m,i) => (
                <th key={i} style={{ textAlign:"right", padding:"10px 8px", fontSize:10, fontWeight:800, color:T.muted, letterSpacing:"0.06em" }}>{String(m).toUpperCase()}</th>
              ))}
              <th style={{ width:40 }}></th>
            </tr>
          </thead>
          <tbody>
            {budget[which].map((b, i) => {
              const isTotal = /total/i.test(b.label);
              return (
                <tr key={i} style={{
                  background: isTotal ? T.surface : "transparent",
                  borderTop: isTotal ? `2px solid ${T.border}` : `1px solid ${T.border}`,
                  fontWeight: isTotal ? 800 : 500,
                }}>
                  <td style={{ padding:"6px 14px", color: isTotal ? T.navy : T.text }}>
                    <EditableText value={b.label} onChange={v => updateRow(which, i, "label", v)}
                      style={{ fontSize:12, fontWeight: isTotal ? 800 : 600, color: isTotal ? T.navy : T.text }}/>
                  </td>
                  {b.values.map((v, ci) => (
                    <td key={ci} style={{ padding:"3px 6px", textAlign:"right", color: v > 0 ? (isTotal ? T.navy : T.ink) : T.faint }}>
                      <EditableNumber value={v} prefix="$" onChange={nv => updateRowCell(which, i, ci, nv)}
                        style={{ fontSize:11.5, fontWeight: isTotal ? 800 : 500, fontFamily: isTotal ? "'ProximaNova Black', sans-serif" : "inherit" }}/>
                    </td>
                  ))}
                  <td style={{ padding:"4px 8px" }}>
                    {!isTotal && <DeleteBtn onClick={() => delRow(which, i)}/>}
                  </td>
                </tr>
              );
            })}
            <tr>
              <td colSpan={monthLabels.length + 2} style={{ padding:"10px" }}>
                <AddRowBtn label="Add line item" onClick={() => addRow(which, monthLabels.length)}/>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );

  return (
    <div>
      {/* Annual targets */}
      <div style={{ marginBottom:24 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
          <span style={{ width:4, height:16, background:T.gold }}></span>
          <h2 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:14, color:T.heading, letterSpacing:"0.1em" }}>ANNUAL BUDGET TARGETS</h2>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:10 }}>
          {budget.annual.map((a, i) => {
            const isTotal = /total/i.test(a.label);
            return (
              <div key={i} style={{
                background: isTotal ? T.navy : T.cardBg,
                border:`1px solid ${isTotal ? T.navy : T.border}`,
                borderRadius:6, padding:"12px 14px",
                color: isTotal ? "#fff" : T.ink,
                position:"relative",
              }}>
                <div style={{ position:"absolute", top:8, right:8 }}>
                  {!isTotal && <DeleteBtn onClick={() => delAnnual(i)}/>}
                </div>
                <p style={{ fontSize:10.5, letterSpacing:"0.08em", fontWeight:700, marginBottom:6, textTransform:"uppercase", color: isTotal ? "rgba(255,255,255,0.6)" : T.muted, paddingRight:30 }}>
                  <EditableText value={a.label} onChange={v => updateAnnual(i, "label", v)}

// ── Budget charts: per-row & total bar charts ──
function BudgetCharts({ budget }) {
  const isTotalLabel = (s) => /total/i.test(s || "");

  // Build month-by-month totals from budgeted vs actual (matching months in monthsBudgeted)
  const months = budget.monthsBudgeted || [];

  // Sum of all non-total budgeted rows per month
  const budgetedPerMonth = months.map((_, mi) => {
    let s = 0;
    for (const row of budget.budgeted || []) {
      if (isTotalLabel(row.label)) continue;
      s += Number(row.values[mi]) || 0;
    }
    return s;
  });

  // Match actual to budget months by month name (monthsActual labels may differ near the end)
  const actualPerMonth = months.map(mLabel => {
    const ai = (budget.monthsActual || []).findIndex(m => String(m).toLowerCase() === String(mLabel).toLowerCase());
    if (ai === -1) return null;
    let s = 0;
    for (const row of budget.actual || []) {
      if (isTotalLabel(row.label)) continue;
      s += Number(row.values[ai]) || 0;
    }
    return s;
  });

  // Per-line-item annual budget vs actual
  const lineItemPairs = [];
  for (const bRow of (budget.budgeted || [])) {
    if (isTotalLabel(bRow.label)) continue;
    const budgetTotal = (bRow.values || []).reduce((s, v) => s + (Number(v) || 0), 0);
    const aRow = (budget.actual || []).find(r => r.label.trim().toLowerCase() === bRow.label.trim().toLowerCase());
    let actualTotal = 0;
    if (aRow) {
      // Sum only the cells that overlap matched months; simpler: sum all non-blank in actual
      // but skip the "Total" / "Budget Feb" trailing columns by length
      const monthsActualLen = (budget.monthsActual || []).filter(m => !/total|budget feb/i.test(m)).length;
      actualTotal = (aRow.values || []).slice(0, monthsActualLen).reduce((s, v) => s + (Number(v) || 0), 0);
    }
    lineItemPairs.push({ label: bRow.label, budget: budgetTotal, actual: actualTotal });
  }
  lineItemPairs.sort((a, b) => b.budget - a.budget);

  const totalBudgeted = budgetedPerMonth.reduce((s, v) => s + v, 0);
  const totalActual = actualPerMonth.reduce((s, v) => s + (v || 0), 0);
  const variance = totalActual - totalBudgeted;

  return (
    <div style={{ marginTop:32 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <span style={{ width:4, height:16, background:T.gold }}></span>
        <h2 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:14, color:T.heading, letterSpacing:"0.1em" }}>VISUAL BREAKDOWN</h2>
        <span style={{ color:T.muted, fontSize:11 }}>Auto-generated from the tables above</span>
      </div>

      {/* Summary chips */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))", gap:10, marginBottom:18 }}>
        <SummaryChip label="BUDGETED" value={totalBudgeted} color={T.vanja}/>
        <SummaryChip label="ACTUAL" value={totalActual} color={T.oloka}/>
        <SummaryChip label="VARIANCE" value={variance} color={variance > 0 ? T.urgent : T.oloka} prefix={variance > 0 ? "+" : ""}/>
      </div>

      {/* Monthly stacked-pair bar chart */}
      <ChartCard title="MONTHLY: BUDGET vs ACTUAL" subtitle="Sum of all line items per month">
        <MonthlyBars months={months} budgeted={budgetedPerMonth} actual={actualPerMonth}/>
      </ChartCard>

      {/* Per-line-item annual bars */}
      <ChartCard title="LINE ITEMS · ANNUAL BUDGET vs ACTUAL" subtitle="Totals across all 12 months">
        <LineItemBars items={lineItemPairs}/>
      </ChartCard>
    </div>
  );
}

// Monthly bars: one pair (budget + actual) per month, side by side
function MonthlyBars({ months, budgeted, actual }) {
  const max = Math.max(1, ...budgeted, ...actual.filter(v => v !== null));
  const colCount = months.length;
  const colWidth = 100 / colCount;

  return (
    <div>
      {/* Legend */}
      <div style={{ display:"flex", gap:14, marginBottom:12 }}>
        <LegendDot color={T.vanja} label="Budgeted"/>
        <LegendDot color={T.oloka} label="Actual"/>
      </div>

      {/* Bars */}
      <div style={{ position:"relative", height:200, marginBottom:6 }}>
        {/* Y-axis ticks */}
        {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
          <div key={i} style={{
            position:"absolute", left:0, right:0, bottom: `${p * 100}%`,
            borderTop:`1px ${i === 0 ? "solid" : "dashed"} ${T.border}`,
          }}>
            <span style={{
              position:"absolute", left:0, top:-10,
              fontSize:9, color:T.muted, fontWeight:700, background:T.cardBg, padding:"0 4px",
            }}>${Math.round(max * p).toLocaleString("en-NZ")}</span>
          </div>
        ))}

        <div style={{ position:"absolute", left:54, right:4, top:0, bottom:0, display:"flex", alignItems:"flex-end" }}>
          {months.map((m, i) => {
            const bH = max ? (budgeted[i] / max) * 100 : 0;
            const aV = actual[i];
            const aH = aV !== null && max ? (aV / max) * 100 : 0;
            return (
              <div key={i} style={{
                flex:1, height:"100%", display:"flex", alignItems:"flex-end",
                justifyContent:"center", gap:2, padding:"0 2px",
              }}>
                <div title={`Budget: $${budgeted[i].toLocaleString("en-NZ")}`} style={{
                  width:"45%", height: `${bH}%`,
                  background:T.vanja, borderRadius:"2px 2px 0 0",
                  minHeight: budgeted[i] > 0 ? 2 : 0,
                }}></div>
                <div title={aV !== null ? `Actual: $${aV.toLocaleString("en-NZ")}` : "No actual data"} style={{
                  width:"45%", height: `${aH}%`,
                  background: aV === null ? T.surface2 : T.oloka,
                  borderRadius:"2px 2px 0 0",
                  minHeight: aV !== null && aV > 0 ? 2 : 0,
                  opacity: aV === null ? 0.3 : 1,
                }}></div>
              </div>
            );
          })}
        </div>
      </div>

      {/* X-axis labels */}
      <div style={{ display:"flex", paddingLeft:54, paddingRight:4 }}>
        {months.map((m, i) => (
          <div key={i} style={{
            flex:1, textAlign:"center", fontSize:9.5, color:T.muted, fontWeight:700, letterSpacing:"0.04em",
          }}>{String(m).slice(0,3).toUpperCase()}</div>
        ))}
      </div>
    </div>
  );
}

function LegendDot({ color, label }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, color:T.text, fontWeight:600 }}>
      <span style={{ width:10, height:10, borderRadius:2, background:color }}></span>{label}

// Horizontal line-item bars
function LineItemBars({ items }) {
  if (!items.length) return <p style={{ fontSize:12, color:T.muted, fontStyle:"italic" }}>No line items.</p>;
  const max = Math.max(1, ...items.map(it => Math.max(it.budget, it.actual)));
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      {items.map((it, i) => {
        const bPct = (it.budget / max) * 100;
        const aPct = (it.actual / max) * 100;
        const over = it.actual > it.budget && it.budget > 0;
        return (
          <div key={i}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
              <p style={{ fontSize:11.5, color:T.ink, fontWeight:600 }}>{it.label}</p>
              <p style={{ fontSize:10.5, color:T.muted, fontWeight:700, letterSpacing:"0.04em" }}>
                <span style={{ color:T.vanja }}>${Math.round(it.budget).toLocaleString("en-NZ")}</span>
                {" · "}
                <span style={{ color: over ? T.urgent : T.oloka }}>${Math.round(it.actual).toLocaleString("en-NZ")}</span>
              </p>
            </div>
            <div style={{ position:"relative", height:14, background:T.surface, borderRadius:3, overflow:"hidden" }}>
              <div title={`Budget: $${it.budget.toLocaleString("en-NZ")}`} style={{
                position:"absolute", left:0, top:0, bottom:0, width:`${bPct}%`,
                background:T.vanja + "55",
              }}></div>
              <div title={`Actual: $${it.actual.toLocaleString("en-NZ")}`} style={{
                position:"absolute", left:0, top:0, bottom:0, width:`${aPct}%`,
                background: over ? T.urgent : T.oloka,
                borderRight: aPct > 0 ? `2px solid ${over ? T.urgent : T.oloka}` : "none",
              }}></div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

  // To Be Completed — holding area for unscheduled tasks

  // Dismissed notifications: { [key]: true }

  const onAvatarChange = (key, data) => setAvatars(prev => ({ ...prev, [key]: data }));
  // Branding — app name, subtitle, custom logo
  const [branding, setBranding] = useS(() => loadOr("branding", () => ({ appName:"PRONTO", appSubtitle:"PRODUCTIVE", logoUrl:null })));
  // Editable task categories
  const [categories, setCategories] = useS(() => loadOr("categories", () => ["Social Post","Email","Video","Design","Blog","Meeting","Event","Admin"]));
  // Post approvals
  const [postApprovals, setPostApprovals] = useS(() => loadOr("postApprovals", () => []));
  // Video schedule events — date → [{ id, talent, location, type, durationMin, notes }]
  const [videoEvents, setVideoEvents] = useS(() => loadOr("videoEvents", () => ({})));
  // Visible tabs preference — array of tab keys that are shown
  const [visibleTabs, setVisibleTabs] = useS(() => loadOr("visibleTabs", () => DEFAULT_TABS.map(t=>t.key)));
  // Branding modal open
  const [brandingModal, setBrandingModal] = useS(false);
  // Settings panel open (gear icon)
  const [settingsOpen, setSettingsOpen] = useS(false);
  // Content type labels (editable in settings)
  const [contentLabels, setContentLabels] = useS(() => loadOr("contentLabels", () => ["Post","Story","Reel","Email","Blog","Ad","Event"]));
  // Video type labels (editable in settings)
  const [videoLabels, setVideoLabels] = useS(() => loadOr("videoLabels", () => ["BTS","Interview","Promo","Tutorial","Testimonial","Product","Event","Other"]));

  // ── Bundle everything for export / autosave ──
  const fullState = () => ({
    version: 1,
    savedAt: new Date().toISOString(),
    tasksByDate, content,
    ideas, suppliers, budget, onboarding, courses, testimonials, photos,
    plan, staff, lunches, schedule, actualSchedule, dayNotes, schedSpans, notifDismissed, activityLog,
    avatars, branding, categories, postApprovals, videoEvents, visibleTabs,

  useE(() => {
    applyTheme(theme);
    try { localStorage.setItem("prontoHQ.theme", theme); } catch(_) {}
  }, []); // run once on mount

  // Autosave on any change — also schedules a Firebase write (debounced 1.5 s)
  useE(() => {
    const state = fullState();
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {}
    if (syncRef.current) syncRef.current.scheduleWrite(state);
  }, [tasksByDate, content, ideas, suppliers, budget, onboarding, courses, testimonials, photos, plan, staff, lunches, schedule, actualSchedule, dayNotes, schedSpans, notifDismissed, activityLog, avatars, branding, categories, postApprovals, videoEvents, visibleTabs, contentLabels, videoLabels, recurringTasks, ongoingJobs, toBeCompleted]);
  // Sync categories to window so views.jsx can use them
  useE(() => { window.prontoCats = categories; }, [categories]);

  // ── Export current state to a JSON file download ──
  const exportState = () => {
    const blob = new Blob([JSON.stringify(fullState(), null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 16);
    a.href = url;
    a.download = `pronto-hq-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // ── Import state from a JSON file ──
  const fileInputRef = useR(null);
  const syncRef = useR(null);
  const importState = () => fileInputRef.current && fileInputRef.current.click();
  const handleImportFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data || typeof data !== "object") throw new Error("Invalid file");
        if (!confirm("Replace ALL current data with the contents of this file? Your local edits will be overwritten.")) return;
        if (data.tasksByDate) setTasksByDate(data.tasksByDate);
        if (data.content) setContent(data.content);
        if (data.ideas) setIdeas(data.ideas);
        if (data.suppliers) setSuppliers(data.suppliers);
        if (data.budget) setBudget(data.budget);
        if (data.onboarding) setOnboarding(data.onboarding);
        if (data.courses) setCourses(data.courses);
        if (data.testimonials) setTestimonials(data.testimonials);
        if (data.photos) setPhotos(data.photos);
        if (data.plan) setPlan(data.plan);
        if (data.staff) setStaff(data.staff);
        if (data.lunches) setLunches(data.lunches);
      } catch (err) {
        alert("Could not read that file:\n" + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // ── Apply a full state blob (used by Sheet pull) ──
  const applyState = (s) => {
    if (!s) return;
    if (s.tasksByDate) setTasksByDate(s.tasksByDate);
    if (s.content) setContent(s.content);
    if (s.ideas) setIdeas(s.ideas);
    if (s.suppliers) setSuppliers(s.suppliers);
    if (s.budget) setBudget(s.budget);
    if (s.onboarding) setOnboarding(s.onboarding);
    if (s.courses) setCourses(s.courses);
    if (s.testimonials) setTestimonials(s.testimonials);
    if (s.photos) setPhotos(s.photos);
    if (s.plan) setPlan(s.plan);
    if (s.staff) setStaff(s.staff);
    if (s.lunches) setLunches(s.lunches);
    if (s.schedule) setSchedule(s.schedule);
    if (s.actualSchedule) setActualSchedule(s.actualSchedule);
    if (s.dayNotes) setDayNotes(s.dayNotes);
    if (s.schedSpans) setSchedSpans(s.schedSpans);
    if (s.notifDismissed) setNotifDismissed(s.notifDismissed);
    if (s.avatars) setAvatars(s.avatars);
    if (s.branding) setBranding(s.branding);
    if (s.categories) setCategories(s.categories);
    if (s.postApprovals) setPostApprovals(s.postApprovals);
    if (s.videoEvents) setVideoEvents(s.videoEvents);
    if (s.visibleTabs) setVisibleTabs(s.visibleTabs);
    if (s.contentLabels) setContentLabels(s.contentLabels);
    if (s.videoLabels) setVideoLabels(s.videoLabels);
    if (s.recurringTasks) setRecurringTasks(s.recurringTasks);
    if (s.ongoingJobs)    setOngoingJobs(s.ongoingJobs);
    if (s.toBeCompleted)  setToBeCompleted(s.toBeCompleted);
  };

  // ── Export schedule as .ics (for Samsung Calendar / Outlook import) ──
  const exportICS = () => {
    const SCHED_START_H = 7; // 7am baseline used in schedule.jsx
    const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Pronto Productive//EN","CALSCALE:GREGORIAN"];
    for (const dk of Object.keys(schedule)) {
      const d = parseISO(dk);
      for (const owner of ["vanja","oloka"]) {
        for (const b of (schedule[dk][owner]||[])) {
          if (b.isBreak) continue;
          const startH = SCHED_START_H + Math.floor((b.startMin||0) / 60);
          const startM = (b.startMin||0) % 60;
          const endMin = (b.startMin||0) + (b.durationMin||60);
          const endH = SCHED_START_H + Math.floor(endMin / 60);
          const endMm = endMin % 60;
          const dt = (h, m) => `${String(d.getFullYear())}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}T${String(startH).padStart(2,'0')}${String(startM).padStart(2,'0')}00`;
          const title = b.isQuickEvent ? (b.qeTitle||"Event") : ("Task block");
          lines.push("BEGIN:VEVENT", `UID:${b.taskId||b.qeId||Date.now()}@pronto`, `DTSTART:${dt(startH,startM)}`, `DTEND:${dt(endH,endMm)}`, `SUMMARY:${title} (${owner})`, "END:VEVENT");
        }
      }
    }
    lines.push("END:VCALENDAR");
    const blob = new Blob([lines.join("\r\n")], { type:"text/calendar" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "pronto-schedule.ics";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    alert("Exported! Open pronto-schedule.ics in Samsung Calendar or Outlook to import your schedule.");
  };

  // ── Reset all data back to the original spreadsheet defaults ──
  const resetState = () => {
    if (!confirm("Reset EVERYTHING back to the original Marketing 2026 data? You'll lose all edits in this browser.")) return;
    try { localStorage.removeItem(LS_KEY); } catch (_) {}
    window.location.reload();
  };

  const onToggle = (id) => setTasksByDate(prev => {
    const next = { ...prev };
    let taskText = "";
    let wasDone = false;
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => {
      if (t.id === id) { taskText = t.text; wasDone = t.done; return { ...t, done: !t.done }; }
      return t;
    });
    logActivity(todayUser, wasDone ? "unchecked" : "completed", taskText);
    return next;
  });
  const onChangePriority = (id, priority) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, priority } : t);
    return next;
  });
  const onChangeOwner = (id, owner) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, owner } : t);
    return next;
  });
  const onChangeText = (id, text) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, text } : t);
    return next;
  });
  const onChangeCategory = (id, category) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, category } : t);
    return next;
  });
  const onAdd = (dateKey, data) => {
    logActivity(todayUser, "added task", data.text || "New task");
    setTasksByDate(prev => {
      const arr = prev[dateKey] || [];
      const id = Math.max(0, ...Object.values(prev).flat().map(t => t.id)) + 1;
      return { ...prev, [dateKey]: [...arr, { ...data, id }] };
    });
  };
  const onChangeSubtasks = (id, subtasks) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, subtasks } : t);
    return next;
  });
  const onChangeNotes = (id, notes) => setTasksByDate(prev => {
    const next = { ...prev };
    for (const dk of Object.keys(next)) next[dk] = next[dk].map(t => t.id === id ? { ...t, notes } : t);
    return next;
  });
  // Drag a task onto another → convert it to a subtask of the target
  const onConvertToSubtask = (parentId, sourceId, fromDate) => {
    if (parentId === sourceId) return;
    setTasksByDate(prev => {
      const next = { ...prev };
      // 1. find source task & remove it from its date
      let source = null;
      const dates = fromDate && next[fromDate] ? [fromDate] : Object.keys(next);
      for (const dk of dates) {
        const idx = (next[dk] || []).findIndex(t => t.id === sourceId);
        if (idx !== -1) {
          source = next[dk][idx];
          next[dk] = next[dk].filter(t => t.id !== sourceId);
          break;
        }
      }
      if (!source) return prev;
      // 2. find parent task across all dates and append source as a subtask
      let found = false;
      for (const dk of Object.keys(next)) {
        next[dk] = next[dk].map(t => {
          if (t.id !== parentId) return t;
          found = true;
          const existing = t.subtasks || [];
          const newSubId = Math.max(0, ...existing.map(s => s.id || 0)) + 1;
          // Bring any nested subtasks too — flatten by appending after the parent line
          const incoming = [{ id: newSubId, text: source.text, done: source.done }];
          (source.subtasks || []).forEach((s, i) => {
            incoming.push({ id: newSubId + 1 + i, text: s.text, done: s.done });
          });
          return { ...t, subtasks: [...existing, ...incoming] };
        });
      }
      if (!found) return prev;
      return next;
    });
  };
  const onDeleteTask = (dateKey, id) => setTasksByDate(prev => {
    const arr = (prev[dateKey] || []).filter(t => t.id !== id);
    const next = { ...prev };
    if (arr.length === 0) delete next[dateKey]; else next[dateKey] = arr;
    return next;
  });

  // Move a task to the next weekday (Fri → Mon)
  const onShift = (id, fromKey) => setTasksByDate(prev => {
    const next = { ...prev };
    let task = null;
    if (next[fromKey]) {
      const arr = next[fromKey].filter(t => {
        if (t.id === id) { task = t; return false; }
        return true;
      });
      next[fromKey] = arr;
    }
    if (!task) return prev;
    const d = parseISO(fromKey);
    let nd = addDays(d, 1);
    while (nd.getDay() === 0 || nd.getDay() === 6) nd = addDays(nd, 1);
    const toKey = isoDate(nd);
    next[toKey] = [...(next[toKey] || []), { ...task, recurring: false }];
    return next;
  });

  // Move a task to an arbitrary date (drag & drop)
  const onMoveTask = (id, fromKey, toKey) => setTasksByDate(prev => {
    if (fromKey === toKey) return prev;
    const next = { ...prev };
    let task = null;
    if (next[fromKey]) {
      next[fromKey] = next[fromKey].filter(t => {
        if (t.id === id) { task = t; return false; }
        return true;
      });
    }
    if (!task) return prev;
    next[toKey] = [...(next[toKey] || []), { ...task, recurring: false }];
    return next;
  });

    if (tab === "schedule") setSelDate(d => addDays(d, delta));
    else if (tab === "content") {
      if (contentView === "month") setSelDate(d => { const nd = new Date(d); nd.setMonth(nd.getMonth() + delta); return nd; });
      else setSelDate(d => addDays(d, delta * 7));
    }
    else if (view === "week") setSelDate(d => addDays(d, delta * 7));
    else if (view === "month") setSelDate(d => { const nd = new Date(d); nd.setMonth(nd.getMonth() + delta); return nd; });
    else setSelDate(d => addDays(d, delta));
  };

  const onPickDate = (d) => { setSelDate(d); setView("day"); setTab("tasks"); };

  const dateLabel = useM(() => {
    if (tab === "schedule") {
      const todayD = today();
      if (sameDay(selDate, todayD)) return `Today · ${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()].slice(0,3)}`;
      return `${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()]} ${selDate.getFullYear()}`;
    }
    if (tab === "content") {
      if (contentView === "month") return `${MONTHS[selDate.getMonth()]} ${selDate.getFullYear()}`;
      const mon = startOfWeek(selDate);
      const fri = addDays(mon, 4);
      return `Week of ${mon.getDate()} ${MONTHS[mon.getMonth()].slice(0,3)} – ${fri.getDate()} ${MONTHS[fri.getMonth()].slice(0,3)}`;
    }
    if (view === "day") {
      const todayD = today();
      if (sameDay(selDate, todayD)) return `Today · ${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()].slice(0,3)}`;
      if (sameDay(selDate, addDays(todayD, 1))) return `Tomorrow · ${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()].slice(0,3)}`;
      if (sameDay(selDate, addDays(todayD, -1))) return `Yesterday · ${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()].slice(0,3)}`;
      return `${DAYS_LONG[selDate.getDay()]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()]} ${selDate.getFullYear()}`;
    }
    if (view === "week") {
      const mon = startOfWeek(selDate);
      const fri = addDays(mon, 4);
      return `Week of ${mon.getDate()} ${MONTHS[mon.getMonth()].slice(0,3)} – ${fri.getDate()} ${MONTHS[fri.getMonth()].slice(0,3)}`;
    }
    return `${MONTHS[selDate.getMonth()]} ${selDate.getFullYear()}`;
  }, [selDate, view, tab]);

  const heading = useM(() => {
    if (tab === "schedule") {
      const todayD = today();
      return {
        eyebrow: sameDay(selDate, todayD) ? "TODAY · BUILD MY DAY" : `${DAYS_LONG[selDate.getDay()].toUpperCase()} · BUILD MY DAY`,
        big: "SCHEDULE",
        sub: "Drag tasks from your to-do list into the timeline. Resize blocks to set how long each takes.",
      };
    }
    if (tab !== "tasks") return null;
    if (view === "day") {
      const todayD = today();
      if (sameDay(selDate, todayD)) return { eyebrow: `${DAYS_LONG[selDate.getDay()].toUpperCase()} · WEEK ${Math.ceil(selDate.getDate()/7)}`, big:"TODAY'S TASKS", sub:"What needs to ship today — by person, by priority." };
      return { eyebrow: `${DAYS_LONG[selDate.getDay()].toUpperCase()} · ${selDate.getDate()} ${MONTHS[selDate.getMonth()].toUpperCase()}`, big:"DAY VIEW", sub:`Tasks for ${DAYS_LONG[selDate.getDay()]}.` };
    }

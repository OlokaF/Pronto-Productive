              fontSize:11.5, color:T.ink,
              background:T.cardBg, border:`1px solid ${T.border}`,
              padding:"5px 11px", borderRadius:4, fontWeight:600,
            }}>{p}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── CHAT view ──
function ChatView({ msgs, setMsgs, chatAs, setChatAs, tasksByDate, onJumpToTask }) {
  const [draft, setDraft] = useStateV("");
  const [mentionMenu, setMentionMenu] = useStateV(null); // { trigger:"@"|"menu", query }
  const [hoverIdx, setHoverIdx] = useStateV(0);
  const [attachOpen, setAttachOpen] = useStateV(false);
  const [recording, setRecording] = useStateV(null); // { startedAt }
  const chatScroll = useRefV(null);
  const inputRef = useRefV(null);
  const imageInputRef = useRefV(null);
  const attachRef = useRefV(null);
  const recorderRef = useRefV(null);
  const recChunksRef = useRefV([]);
  const recTickRef = useRefV(null);
  const [recElapsed, setRecElapsed] = useStateV(0);

  useEffectV(() => { if (chatScroll.current) chatScroll.current.scrollTop = chatScroll.current.scrollHeight; }, [msgs]);

  // Close attach menu on outside click
  useEffectV(() => {
    const h = (e) => { if (attachRef.current && !attachRef.current.contains(e.target)) setAttachOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const allTasks = useMemoV(() => {
    const out = [];
    for (const dk of Object.keys(tasksByDate || {})) {
      for (const t of (tasksByDate[dk] || [])) {
        if (t.category === "Event" || t.owner === "event") continue;
        out.push({ id: t.id, text: t.text, date: dk, owner: t.owner, done: t.done, priority: t.priority });
      }
    }
    return out;
  }, [tasksByDate]);

  const filteredTasks = useMemoV(() => {
    if (!mentionMenu) return [];
    const q = (mentionMenu.query || "").toLowerCase().trim();
    const todayD = today();
    const score = (t) => {
      let s = 0;
      if (q && t.text.toLowerCase().includes(q)) s += 100 - t.text.toLowerCase().indexOf(q);
      if (!t.done) s += 20;
      const d = parseISO(t.date);
      s -= Math.abs((d - todayD) / 86400000);
      return s;
    };
    const list = q
      ? allTasks.filter(t => t.text.toLowerCase().includes(q))
      : allTasks.filter(t => !t.done);
    return list.sort((a, b) => score(b) - score(a)).slice(0, 8);
  }, [mentionMenu, allTasks]);

  const onDraftChange = (e) => {
    const value = e.target.value;
    const caret = e.target.selectionStart;
    setDraft(value);
    const upToCaret = value.slice(0, caret);
    const at = upToCaret.lastIndexOf("@");
    if (at === -1) { if (mentionMenu && mentionMenu.trigger === "@") setMentionMenu(null); return; }
    const before = upToCaret[at - 1];
    if (at > 0 && before && !/\s/.test(before)) { if (mentionMenu && mentionMenu.trigger === "@") setMentionMenu(null); return; }
    const q = upToCaret.slice(at + 1);
    if (/\s/.test(q) || q.length > 30) { if (mentionMenu && mentionMenu.trigger === "@") setMentionMenu(null); return; }
    setMentionMenu({ trigger: "@", query: q, start: at });
    setHoverIdx(0);
  };

  const insertMentionFromAt = (task) => {
    if (!mentionMenu || mentionMenu.trigger !== "@") return;
    const before = draft.slice(0, mentionMenu.start);
    const after = draft.slice(mentionMenu.start + 1 + mentionMenu.query.length);
    const token = `@task:${task.id}`;
    const newDraft = `${before}${token} ${after}`;
    setDraft(newDraft);
    setMentionMenu(null);
    setTimeout(() => {
      if (inputRef.current) {
        inputRef.current.focus();
        const pos = (before + token + " ").length;
        inputRef.current.setSelectionRange(pos, pos);
      }
    }, 0);
  };

  const insertMentionFromMenu = (task) => {
    const append = (draft && !draft.endsWith(" ") ? " " : "") + `@task:${task.id} `;
    setDraft(draft + append);
    setMentionMenu(null);
    setAttachOpen(false);
    setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
  };

  const handleKey = (e) => {
    if (mentionMenu && filteredTasks.length > 0) {
      if (e.key === "ArrowDown") { e.preventDefault(); setHoverIdx(i => (i + 1) % filteredTasks.length); return; }
      if (e.key === "ArrowUp")   { e.preventDefault(); setHoverIdx(i => (i - 1 + filteredTasks.length) % filteredTasks.length); return; }
      if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        if (mentionMenu.trigger === "@") insertMentionFromAt(filteredTasks[hoverIdx]);
        else insertMentionFromMenu(filteredTasks[hoverIdx]);
        return;
      }
      if (e.key === "Escape") { e.preventDefault(); setMentionMenu(null); return; }
    }
    if (e.key === "Enter") sendMsg();
  };

  const sendMsg = (extra = null) => {
    const text = draft.trim();
    if (!text && !extra) return;
    setMsgs(p => [...p, {
      id: (p.length ? Math.max(...p.map(x => x.id || 0)) : 0) + 1,
      from: chatAs,
      text,
      time: new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }),
      ...(extra || {}),
    }]);
    setDraft(""); setMentionMenu(null);
  };

  const handleImageFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * ratio));
        const h = Math.max(1, Math.round(img.height * ratio));
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = c.toDataURL("image/jpeg", 0.82);
        sendMsg({ image: dataUrl });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
    setAttachOpen(false);
  };

  const startRecording = async () => {
    if (recording) return;
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      alert("Voice notes aren't supported in this browser.");
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      recChunksRef.current = [];
      mr.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) recChunksRef.current.push(ev.data); };
      mr.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(recChunksRef.current, { type: "audio/webm" });
        const reader = new FileReader();
        reader.onload = () => {
          const elapsed = recTickRef.current ? Math.round((Date.now() - recTickRef.current) / 1000) : 0;
          sendMsg({ audio: reader.result, audioDuration: elapsed });
        };
        reader.readAsDataURL(blob);
        recorderRef.current = null;
        if (recTickRef.current) { clearInterval(recTickRef.current); recTickRef.current = null; }
        setRecElapsed(0);
        setRecording(null);
      };
      mr.start();
      recorderRef.current = mr;
      const startedAt = Date.now();
      recTickRef.current = startedAt; // used by onstop
      const tick = setInterval(() => setRecElapsed(Math.round((Date.now() - startedAt) / 1000)), 200);
      setRecording({ startedAt, tickId: tick });
      // store interval id too so we can clear it later
      recorderRef.current._tick = tick;
    } catch (err) {
      alert("Couldn't access microphone: " + err.message);
    }
  };
  const stopRecording = (cancel = false) => {
    const mr = recorderRef.current;
    if (!mr) { setRecording(null); return; }
    if (cancel) {
      mr.ondataavailable = null;
      mr.onstop = () => {
        mr.stream && mr.stream.getTracks().forEach(t => t.stop());
        if (recorderRef.current && recorderRef.current._tick) clearInterval(recorderRef.current._tick);
        recorderRef.current = null;
        setRecElapsed(0);
        setRecording(null);
      };
    }
    if (recorderRef.current && recorderRef.current._tick) clearInterval(recorderRef.current._tick);
    try { mr.stop(); } catch (_) {}
  };

  const hasDraft = draft.trim().length > 0;

  return (
    <div style={{ maxWidth:740, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:14 }}>
        <div>
          <p style={{ color:T.gold, fontSize:10, letterSpacing:"0.18em", fontWeight:800, marginBottom:6 }}>TEAM · 2 ACTIVE</p>
          <h1 style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:900, fontSize:42, letterSpacing:"-0.02em", marginBottom:6, lineHeight:0.95, color:T.heading }}>TEAM CHAT</h1>
          <p style={{ color:T.muted, fontSize:13 }}>Tap the paperclip to mention a task or send a photo. Hold the mic to record a voice note.</p>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:11, color:T.muted, letterSpacing:"0.05em" }}>Chatting as:</span>
          <div style={{ display:"flex", background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:24, padding:3 }}>
            {["vanja","oloka"].map(u => {
              const ucol = u==="vanja" ? T.vanja : T.oloka;
              const active = chatAs===u;
              return (
                <button key={u} onClick={() => setChatAs(u)} style={{
                  padding:"6px 14px", borderRadius:20,
                  background: active ? ucol : "transparent",
                  border:"none",
                  color: active ? "#fff" : ucol,
                  fontSize:12, fontWeight:800, cursor:"pointer", fontFamily:"inherit",
                  letterSpacing:"0.04em", transition:"all 0.15s",
                }}>{u==="vanja" ? "Vanja" : "Oloka"}</button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Messages */}
      <div ref={chatScroll} style={{
        background:T.surface, border:`1px solid ${T.border}`, borderRadius:10,
        padding:"22px", marginBottom:14,
        height:460, overflowY:"auto",
        display:"flex", flexDirection:"column", gap:14,
      }}>
        {msgs.map(m => {
          const me = m.from === chatAs;
          const acc = m.from==="vanja" ? T.vanja : T.oloka;
          return (
            <div key={m.id} style={{ display:"flex", flexDirection:"column", alignItems: me ? "flex-end" : "flex-start" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:5, flexDirection: me ? "row-reverse" : "row" }}>
                <div style={{
                  width:24, height:24, borderRadius:"50%",
                  background: m.from==="vanja" ? T.vanjaSoft : T.olokaSoft,
                  border:`1.5px solid ${acc}`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:10.5, fontWeight:800, color:acc, fontFamily:"'ProximaNova Black', sans-serif",
                }}>{m.from==="vanja" ? "V" : "O"}</div>
                <span style={{ color:T.muted, fontSize:10.5, letterSpacing:"0.04em" }}>{m.from==="vanja"?"Vanja":"Oloka"} · {m.time}</span>
              </div>
              <div style={{
                maxWidth:"76%", padding: (m.image && !m.text) ? "4px" : "10px 14px",
                borderRadius: me ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                background: me ? acc : T.cardBg,
                color: me ? "#fff" : T.ink,
                fontSize:13.5, lineHeight:1.5,
                border: me ? "none" : `1px solid ${T.border}`,
                boxShadow: me ? `0 2px 6px ${acc}25` : "none",
                overflow:"hidden",
              }}>
                {m.image && (
                  <img src={m.image} alt="" style={{
                    display:"block", maxWidth:"100%", borderRadius:10,
                    marginBottom: m.text ? 8 : 0,
                  }}/>
                )}
                {m.audio && (
                  <div style={{ display:"flex", alignItems:"center", gap:8, padding:"2px 0" }}>
                    <audio src={m.audio} controls style={{ height:32, maxWidth:240 }}/>
                    {m.audioDuration ? (
                      <span style={{ fontSize:10.5, fontWeight:700, opacity:0.8, letterSpacing:"0.04em" }}>
                        {Math.floor(m.audioDuration/60)}:{String(m.audioDuration%60).padStart(2,"0")}
                      </span>
                    ) : null}
                  </div>
                )}
                {m.text && <MessageContent text={m.text} me={me} allTasks={allTasks} onJumpToTask={onJumpToTask}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* WhatsApp-style composer */}
      <div style={{ position:"relative" }}>
        {/* Mention dropdown */}
        {mentionMenu && filteredTasks.length > 0 && (
          <div style={{
            position:"absolute", bottom:"calc(100% + 8px)", left:0, right:60,
            background:T.cardBg, border:`1px solid ${T.borderStrong}`, borderRadius:10,
            boxShadow:"0 -8px 24px rgba(15,27,58,0.18)",
            overflow:"hidden", zIndex:300,
          }}>
            <div style={{ padding:"7px 12px", background:T.surface, borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <p style={{ fontSize:9.5, color:T.muted, fontWeight:800, letterSpacing:"0.12em" }}>
                {mentionMenu.query ? `TASKS MATCHING "${mentionMenu.query}"` : "MENTION A TASK"}
              </p>
              <button onClick={() => setMentionMenu(null)} style={{
                background:"transparent", border:"none", color:T.muted, fontSize:14, lineHeight:1,
                cursor:"pointer", padding:0,
              }}>×</button>
            </div>
            {filteredTasks.map((t, i) => {
              const ac = t.owner === "vanja" ? T.vanja : T.oloka;
              const d = parseISO(t.date);
              const dateLbl = d.toLocaleDateString("en-NZ", { weekday:"short", day:"numeric", month:"short" });
              const isHover = i === hoverIdx;
              return (
                <button key={t.id}
                  onMouseEnter={() => setHoverIdx(i)}
                  onMouseDown={(e) => {
                    e.preventDefault();
                    if (mentionMenu.trigger === "@") insertMentionFromAt(t);
                    else insertMentionFromMenu(t);
                  }}
                  style={{
                    width:"100%", padding:"9px 12px",
                    background: isHover ? T.surface : T.cardBg,
                    border:"none", cursor:"pointer", fontFamily:"inherit",
                    display:"flex", alignItems:"center", gap:10,
                    textAlign:"left", borderTop: i > 0 ? `1px solid ${T.border}` : "none",
                  }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", background: t.done ? T.faint : ac, flexShrink:0 }}></span>
                  <p style={{ flex:1, fontSize:12.5, color: t.done ? T.muted : T.ink, lineHeight:1.3, fontWeight:500, textDecoration: t.done ? "line-through" : "none" }}>{t.text}</p>
                  <span style={{ fontSize:9.5, color:T.muted, fontWeight:700, letterSpacing:"0.04em", whiteSpace:"nowrap" }}>{dateLbl}</span>
                </button>
              );
            })}
          </div>
        )}

        <input ref={imageInputRef} type="file" accept="image/*" onChange={handleImageFile} style={{ display:"none" }}/>

        {/* Recording state */}
        {recording ? (
          <div style={{
            display:"flex", alignItems:"center", gap:10,
            background:T.cardBg, border:`1px solid ${T.urgent}55`, borderRadius:999,
            padding:"6px 14px 6px 18px",
          }}>
            <span style={{ width:8, height:8, borderRadius:"50%", background:T.urgent, animation:"pulse 1s infinite" }}></span>
            <span style={{ fontSize:12, fontWeight:700, color:T.urgent, letterSpacing:"0.06em", flex:1 }}>
              RECORDING · {Math.floor(recElapsed/60)}:{String(recElapsed%60).padStart(2,"0")}
            </span>
            <button onClick={() => stopRecording(true)} title="Cancel" style={{
              background:"transparent", border:`1px solid ${T.border}`, borderRadius:999,
              padding:"6px 14px", fontSize:11, fontWeight:700, color:T.muted,
              cursor:"pointer", fontFamily:"inherit",
            }}>CANCEL</button>
            <button onClick={() => stopRecording(false)} title="Send voice note" style={{
              width:38, height:38, borderRadius:"50%", background:T.gold, color:"#fff",
              border:"none", cursor:"pointer",
              display:"flex", alignItems:"center", justifyContent:"center",
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        ) : (
          <div style={{
            display:"flex", alignItems:"center", gap:10,
            background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:999,
            padding:"4px 6px 4px 8px", transition:"border-color 0.15s",
          }}>
            {/* Paperclip / attach menu */}
            <div ref={attachRef} style={{ position:"relative" }}>
              <button onClick={() => { setAttachOpen(o => !o); setMentionMenu(null); }} title="Attach"
                style={iconRoundBtn(attachOpen ? T.gold : T.muted)}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
              {attachOpen && (
                <div style={{
                  position:"absolute", bottom:"calc(100% + 10px)", left:-4, zIndex:300,
                  background:T.cardBg, border:`1px solid ${T.borderStrong}`, borderRadius:10,
                  boxShadow:"0 -8px 24px rgba(15,27,58,0.18)",
                  overflow:"hidden", minWidth:180,
                }}>
                  <button onClick={() => { imageInputRef.current && imageInputRef.current.click(); }} style={attachMenuItem}>
                    <span style={{ ...attachMenuIcon, background:T.vanja + "20", color:T.vanja }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21,15 16,10 5,21"/>
                      </svg>
                    </span>
                    <span>Photo</span>
                  </button>
                  <button onClick={() => { setMentionMenu({ trigger:"menu", query:"" }); setAttachOpen(false); }} style={{ ...attachMenuItem, borderTop:`1px solid ${T.border}` }}>
                    <span style={{ ...attachMenuIcon, background:T.gold + "20", color:T.gold }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="9 11 12 14 22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                      </svg>
                    </span>
                    <span>Mention task</span>
                  </button>
                </div>
              )}
            </div>

            <input
              ref={inputRef}
              value={draft} onChange={onDraftChange}
              onKeyDown={handleKey}
              placeholder="Type a message"
              style={{
                flex:1, padding:"6px 4px",
                background:"transparent", border:"none",
                color:T.ink, fontSize:14, outline:"none", fontFamily:"inherit",
              }}
            />

            {/* Send or mic */}
            {hasDraft ? (
              <button onClick={() => sendMsg()} title="Send"
                style={{ ...iconRoundBtn("#fff"), background: T.gold, width:38, height:38 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/>
                </svg>
              </button>
            ) : (
              <button onClick={startRecording} title="Record voice note"
                style={{ ...iconRoundBtn(T.muted), width:38, height:38, background:T.surface2 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="9" y="2" width="6" height="13" rx="3"/>
                  <path d="M5 11v1a7 7 0 0 0 14 0v-1"/>
                  <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
            )}
          </div>
        )}
      </div>

      <style>{`
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
      `}</style>
    </div>
  );
}

function iconRoundBtn(color) {
  return {
    width:36, height:36, borderRadius:"50%",
    background:"transparent", border:"none",
    color, cursor:"pointer", fontFamily:"inherit",
    display:"flex", alignItems:"center", justifyContent:"center",
    transition:"all 0.15s", flexShrink:0,
  };
}
const attachMenuItem = {
  display:"flex", alignItems:"center", gap:10, width:"100%",
  padding:"10px 14px", border:"none", background:"transparent",
  cursor:"pointer", fontFamily:"inherit",
  fontSize:13, color:T.ink, fontWeight:600, textAlign:"left",
};
const attachMenuIcon = {
  width:26, height:26, borderRadius:6,
  display:"flex", alignItems:"center", justifyContent:"center",
  flexShrink:0,
};

// Render a chat message, turning @task:N tokens into colored pills
function MessageContent({ text, me, allTasks, onJumpToTask }) {
  const parts = [];
  const re = /@task:(\d+)/g;
  let lastIdx = 0;
  let match;
  while ((match = re.exec(text)) !== null) {
    if (match.index > lastIdx) parts.push({ type:"text", value: text.slice(lastIdx, match.index) });
    const id = parseInt(match[1], 10);
    const task = allTasks.find(t => t.id === id);
    parts.push({ type:"mention", id, task });
    lastIdx = match.index + match[0].length;
  }
  if (lastIdx < text.length) parts.push({ type:"text", value: text.slice(lastIdx) });

  return (
    <span>
      {parts.map((p, i) => {
        if (p.type === "text") return <span key={i}>{p.value}</span>;
        if (!p.task) {
          return <span key={i} style={{
            background: me ? "rgba(255,255,255,0.25)" : T.surface2,
            color: me ? "#fff" : T.muted,
            padding:"1px 7px", borderRadius:4, fontStyle:"italic",
            fontSize:"0.92em",
          }}>@deleted task</span>;
        }
        const ac = p.task.owner === "vanja" ? T.vanja : T.oloka;
        return (
          <button key={i}
            onClick={() => onJumpToTask && onJumpToTask(p.task.date)}
            style={{
              display:"inline-flex", alignItems:"center", gap:4,
              background: me ? "rgba(255,255,255,0.22)" : ac + "18",
              color: me ? "#fff" : ac,
              padding:"1px 7px 1px 5px", borderRadius:4,
              border: me ? "1px solid rgba(255,255,255,0.35)" : `1px solid ${ac}55`,
              fontSize:"0.92em", fontWeight:700, fontFamily:"inherit",
              cursor:"pointer", verticalAlign:"baseline",
              textDecoration: p.task.done ? "line-through" : "none",
              margin:"0 1px",
            }}
            title={`${p.task.owner === "vanja" ? "Vanja" : "Oloka"} · ${p.task.date}${p.task.done ? " · done" : ""}`}
          >
            <span style={{ width:5, height:5, borderRadius:"50%", background: me ? "#fff" : ac, opacity: me ? 0.9 : 1 }}></span>
            @{p.task.text.length > 40 ? p.task.text.slice(0, 40) + "…" : p.task.text}
          </button>
        );
      })}
    </span>
  );
}

Object.assign(window, { DayView, WeekView, MonthView, ChatView });

</script>
<script type="text/babel">
// ── Extras: Search, Notifications bell, Today dashboard ──
const { useState: useSx, useEffect: useEx, useRef: useRx, useMemo: useMx } = React;

// ── Global search ──
function SearchBar({ tasksByDate, content, ideas, suppliers, staff, onJumpTask, onJumpContent, onJumpStaff, onJumpTab }) {
  const [q, setQ] = useSx("");
  const [open, setOpen] = useSx(false);
  const [hoverIdx, setHoverIdx] = useSx(0);
  const ref = useRx(null);

  useEx(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  // Cmd/Ctrl+K to focus search
  useEx(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        const input = ref.current && ref.current.querySelector("input");
        if (input) { input.focus(); setOpen(true); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const results = useMx(() => {
    const query = q.trim().toLowerCase();
    if (!query) return [];
    const out = [];
    for (const dk of Object.keys(tasksByDate || {})) {
      for (const t of (tasksByDate[dk] || [])) {
        if (t.text && t.text.toLowerCase().includes(query)) {
          out.push({ kind: "task", label: t.text, sub: `Task · ${dk}${t.done ? " · done" : ""}`,
            color: t.owner === "vanja" ? T.vanja : t.owner === "oloka" ? T.oloka : T.muted,
            jump: () => onJumpTask(dk) });
        }
      }
    }
    for (const dk of Object.keys(content || {})) {
      for (const p of (content[dk] || [])) {
        if ((p.title || "").toLowerCase().includes(query) || (p.notes || "").toLowerCase().includes(query)) {
          out.push({ kind: "post", label: p.title || "(untitled)", sub: `Post · ${p.type || "Post"} · ${dk}`,
            color: (CONTENT_TYPES[p.type] || CONTENT_TYPES.Post).color,
            jump: () => onJumpContent(dk) });
        }
      }
    }
    const normIdea = (raw) => raw && typeof raw === "object" ? raw : { text: String(raw || "") };
    (ideas.general || []).forEach((raw, i) => {
      const it = normIdea(raw);
      if ((it.text || "").toLowerCase().includes(query) || (it.notes || "").toLowerCase().includes(query)) {
        out.push({ kind: "idea", label: it.text || "(empty)", sub: "Idea · General",
          color: T.gold, jump: () => onJumpTab("resources") });
      }
    });
    (ideas.video || []).forEach((raw) => {
      const it = normIdea(raw);
      if ((it.text || "").toLowerCase().includes(query) || (it.notes || "").toLowerCase().includes(query)) {
        out.push({ kind: "idea", label: it.text || "(empty)", sub: "Idea · Video",
          color: T.urgent, jump: () => onJumpTab("resources") });
      }
    });
    (suppliers || []).forEach(s => {
      const hay = [s.product, s.company, s.contact, s.company2, s.contact2, s.notes].join(" ").toLowerCase();
      if (hay.includes(query)) {
        out.push({ kind: "supplier", label: s.product || s.company || "Supplier", sub: `Supplier · ${s.company || ""}`,
          color: T.navy, jump: () => onJumpTab("resources") });
      }
    });
    (staff || []).forEach(s => {
      const hay = [s.name, s.about, s.personality].join(" ").toLowerCase();
      if (hay.includes(query)) {
        out.push({ kind: "staff", label: s.name || "Team", sub: "Team member",
          color: T.oloka, jump: () => onJumpStaff() });
      }
    });
    return out.slice(0, 12);
  }, [q, tasksByDate, content, ideas, suppliers, staff]);

  const choose = (i) => {
    const r = results[i];
    if (!r) return;
    r.jump();
    setOpen(false);
    setQ("");
  };

  return (
    <div ref={ref} style={{ position:"relative" }}>
      <div style={{
        display:"flex", alignItems:"center", gap:7,
        background:T.surface, border:`1px solid ${open ? T.gold : T.border}`, borderRadius:6,
        padding:"6px 10px", minWidth:240, transition:"border-color 0.15s",
      }}>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke={T.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="7" cy="7" r="4.5"/><line x1="13" y1="13" x2="10.3" y2="10.3"/>
        </svg>
        <input value={q} onChange={e => { setQ(e.target.value); setOpen(true); setHoverIdx(0); }}
          onFocus={() => setOpen(true)}
          onKeyDown={e => {
            if (e.key === "ArrowDown") { e.preventDefault(); setHoverIdx(i => (i+1) % Math.max(1, results.length)); }
            else if (e.key === "ArrowUp") { e.preventDefault(); setHoverIdx(i => (i - 1 + Math.max(1, results.length)) % Math.max(1, results.length)); }
            else if (e.key === "Enter") choose(hoverIdx);
            else if (e.key === "Escape") { setOpen(false); e.target.blur(); }
          }}
          placeholder="Search everything…"
          style={{ flex:1, background:"transparent", border:"none", color:T.ink, fontSize:12, outline:"none", fontFamily:"inherit" }}
        />
        <span style={{ fontSize:9.5, color:T.faint, fontWeight:700, letterSpacing:"0.06em", border:`1px solid ${T.border}`, padding:"1px 5px", borderRadius:3 }}>⌘K</span>
      </div>
      {open && q && (
        <div style={{
          position:"absolute", top:"calc(100% + 6px)", left:0, right:0, zIndex:400,
          background:T.cardBg, border:`1px solid ${T.borderStrong}`, borderRadius:8,
          boxShadow:"0 12px 28px rgba(15,27,58,0.18)", overflow:"hidden", maxHeight:380, overflowY:"auto",
        }}>
          {results.length === 0 ? (
            <p style={{ padding:"14px", fontSize:12, color:T.muted, fontStyle:"italic" }}>No matches.</p>
          ) : results.map((r, i) => (
            <button key={i}
              onMouseEnter={() => setHoverIdx(i)}
              onMouseDown={(e) => { e.preventDefault(); choose(i); }}
              style={{
                width:"100%", padding:"9px 12px",
                background: i === hoverIdx ? T.surface : T.cardBg,
                border:"none", cursor:"pointer", fontFamily:"inherit",
                display:"flex", alignItems:"center", gap:10, textAlign:"left",
                borderTop: i > 0 ? `1px solid ${T.border}` : "none",
              }}>
              <span style={{ width:7, height:7, borderRadius:"50%", background:r.color, flexShrink:0 }}></span>
              <div style={{ flex:1, minWidth:0 }}>
                <p style={{ fontSize:12.5, color:T.ink, fontWeight:600, lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.label}</p>
                <p style={{ fontSize:10, color:T.muted, marginTop:2, letterSpacing:"0.04em", fontWeight:700 }}>{r.sub}</p>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Notifications bell ──
function NotificationsBell({ tasksByDate, schedule, staff, msgs, chatAs, dismissed, setDismissed, onJumpTask, onJumpStaff, onJumpSchedule, onJumpChat }) {
  const [open, setOpen] = useSx(false);
  const ref = useRx(null);
  useEx(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const dismiss = (key) => setDismissed(prev => ({ ...prev, [key]: true }));
  const isDismissed = (key) => !!(dismissed && dismissed[key]);

  const todayD = today();
  const dk = isoDate(todayD);
  const tasksToday = tasksByDate[dk] || [];
  const dueTodayOpen = tasksToday.filter(t => !t.done && t.category !== "Event" && t.owner !== "event")
    .filter(t => !isDismissed(`task:${t.id}`));
  const urgent = [];
  for (const date of Object.keys(tasksByDate || {})) {
    for (const t of (tasksByDate[date] || [])) {
      if (t.priority === "Urgent" && !t.done && t.category !== "Event" && t.owner !== "event") {
        if (!isDismissed(`urgent:${t.id}`)) urgent.push({ ...t, date });
      }
    }
  }
  const realNow = new Date();
  const realNowMin = realNow.getHours()*60 + realNow.getMinutes();
  const todaySched = schedule[dk] || { vanja: [], oloka: [] };
  const soonBlocks = [];
  ["vanja","oloka"].forEach(owner => {
    (todaySched[owner] || []).forEach(b => {
      const delta = b.startMin - realNowMin;
      if (delta >= -5 && delta <= 60) {
        const key = `block:${dk}:${owner}:${b.taskId}`;
        if (!isDismissed(key)) soonBlocks.push({ ...b, owner, key });
      }
    });
  });

  const upcomingBdays = [];
  for (const s of staff || []) {
    if (!s.dob) continue;
    const m = (s.dob || "").match(/^\d{4}-(\d{2})-(\d{2})$/);
    if (!m) continue;
    const month = parseInt(m[1]), day = parseInt(m[2]);
    let next = new Date(todayD.getFullYear(), month-1, day);
    if (next < todayD) next = new Date(todayD.getFullYear()+1, month-1, day);
    const daysAway = Math.ceil((next - todayD) / 86400000);
    if (daysAway <= 7) {
      const key = `bday:${s.name}:${next.getFullYear()}`;
      if (!isDismissed(key)) upcomingBdays.push({ ...s, daysAway, next, key });
    }
  }
  upcomingBdays.sort((a,b) => a.daysAway - b.daysAway);

  // Unread messages from the OTHER person
  const newMessages = (msgs || [])
    .filter(m => m.from !== chatAs)
    .filter(m => !isDismissed(`msg:${m.id}`))
    .slice(-10).reverse();

  const allKeys = [
    ...dueTodayOpen.map(t => `task:${t.id}`),
    ...urgent.map(t => `urgent:${t.id}`),
    ...soonBlocks.map(b => b.key),
    ...upcomingBdays.map(b => b.key),
    ...newMessages.map(m => `msg:${m.id}`),
  ];
  const count = allKeys.length;

  const clearAll = () => {
    if (count === 0) return;
    setDismissed(prev => {
      const next = { ...prev };
      for (const k of allKeys) next[k] = true;
      return next;
    });
  };

  const rowDismiss = (key, e) => {
    if (e) e.stopPropagation();
    dismiss(key);
  };

  return (
    <div ref={ref} style={{ position:"relative" }}>
      <button onClick={() => setOpen(o => !o)} title="Notifications" style={{
        width:34, height:34, borderRadius:6,
        background: open ? T.gold : T.surface,
        border:`1px solid ${open ? T.gold : T.border}`,
        color: open ? "#fff" : T.text, cursor:"pointer",
        display:"flex", alignItems:"center", justifyContent:"center",
        position:"relative", fontFamily:"inherit",
      }}>
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3.5 12.5h9l-1-1.2V7a3.5 3.5 0 0 0-7 0v4.3z"/><path d="M6.5 14a1.5 1.5 0 0 0 3 0"/>
        </svg>
        {count > 0 && (
          <span style={{
            position:"absolute", top:-4, right:-4,
            minWidth:16, height:16, padding:"0 4px", borderRadius:8,
            background:T.urgent, color:"#fff",
            fontSize:9.5, fontWeight:800, letterSpacing:"0.04em",
            display:"flex", alignItems:"center", justifyContent:"center",
            border:"2px solid #fff",
          }}>{count}</span>
        )}
      </button>
      {open && (
        <div style={{
          position:"absolute", top:"calc(100% + 8px)", right:0, zIndex:400,
          width:360, background:T.cardBg, border:`1px solid ${T.borderStrong}`, borderRadius:10,
          boxShadow:"0 12px 32px rgba(15,27,58,0.2)", overflow:"hidden",
          maxHeight:560, overflowY:"auto",
        }}>
          <div style={{ padding:"12px 16px", background:T.navy, color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <p style={{ fontFamily:"'ProximaNova Black', sans-serif", fontWeight:800, fontSize:12, letterSpacing:"0.1em" }}>NOTIFICATIONS</p>
              <p style={{ fontSize:10.5, opacity:0.7, marginTop:2 }}>{todayD.toLocaleDateString("en-NZ", { weekday:"long", day:"numeric", month:"long" })}</p>
            </div>
            {count > 0 && (
              <button onClick={clearAll} title="Mark all as read" style={{
                background:"transparent", border:`1px solid rgba(255,255,255,0.3)`, borderRadius:4,
                color:"#fff", fontSize:9.5, fontWeight:800, letterSpacing:"0.08em",
                padding:"5px 9px", cursor:"pointer", fontFamily:"inherit",
              }}>CLEAR ALL</button>
            )}
          </div>
          {count === 0 && (
            <p style={{ padding:"20px 16px", fontSize:12, color:T.muted, fontStyle:"italic", textAlign:"center" }}>You're all clear. ✓</p>
          )}
          {newMessages.length > 0 && (
            <NotifSection title={`NEW MESSAGES · ${newMessages.length}`} color={T.gold}>
              {newMessages.map(m => {
                const c = m.from === "vanja" ? T.vanja : T.oloka;
                const preview = (m.text || (m.image ? "📷 Photo" : m.audio ? "🎤 Voice note" : "(no text)")).slice(0, 60);
                return (
                  <NotifItem key={`msg-${m.id}`} color={c}
                    title={preview}
                    sub={`${m.from === "vanja" ? "Vanja" : "Oloka"} · ${m.time || ""}`}
                    onClick={() => { onJumpChat && onJumpChat(); dismiss(`msg:${m.id}`); setOpen(false); }}
                    onDismiss={(e) => rowDismiss(`msg:${m.id}`, e)}
                  />
                );
              })}
            </NotifSection>
          )}
          {soonBlocks.length > 0 && (
            <NotifSection title="STARTING SOON" color={T.gold}>
              {soonBlocks.map((b, i) => (
                <NotifItem key={b.key} color={b.owner === "vanja" ? T.vanja : T.oloka}
                  title={`${fmtSchedTime(b.startMin)} · ${b.durationMin}m`}
                  sub={`${b.owner === "vanja" ? "Vanja" : "Oloka"} · scheduled block`}
                  onClick={() => { onJumpSchedule(); setOpen(false); }}
                  onDismiss={(e) => rowDismiss(b.key, e)}
                />
              ))}
            </NotifSection>
          )}
          {urgent.length > 0 && (
            <NotifSection title={`URGENT · ${urgent.length}`} color={T.urgent}>
              {urgent.slice(0, 10).map(t => (
                <NotifItem key={`u${t.id}`} color={t.owner === "vanja" ? T.vanja : T.oloka}
                  title={t.text} sub={`${t.owner === "vanja" ? "Vanja" : "Oloka"} · ${t.date}`}
                  onClick={() => { onJumpTask(t.date); setOpen(false); }}
                  onDismiss={(e) => rowDismiss(`urgent:${t.id}`, e)}
                />
              ))}
            </NotifSection>
          )}
          {dueTodayOpen.length > 0 && (
            <NotifSection title={`DUE TODAY · ${dueTodayOpen.length} OPEN`} color={T.navy}>
              {dueTodayOpen.slice(0, 10).map(t => (
                <NotifItem key={`d${t.id}`} color={t.owner === "vanja" ? T.vanja : T.oloka}
                  title={t.text} sub={`${t.owner === "vanja" ? "Vanja" : "Oloka"} · ${t.priority}`}
                  onClick={() => { onJumpTask(dk); setOpen(false); }}
                  onDismiss={(e) => rowDismiss(`task:${t.id}`, e)}
                />
              ))}
            </NotifSection>
          )}
          {upcomingBdays.length > 0 && (
            <NotifSection title="UPCOMING BIRTHDAYS" color={T.oloka}>
              {upcomingBdays.map((s) => (
                <NotifItem key={s.key} color={T.oloka}
                  title={`🎂 ${s.name}`}
                  sub={s.daysAway === 0 ? "TODAY" : s.daysAway === 1 ? "TOMORROW" : `${s.daysAway} days · ${s.next.toLocaleDateString("en-NZ", { day:"numeric", month:"short" })}`}
                  onClick={() => { onJumpStaff(); setOpen(false); }}
                  onDismiss={(e) => rowDismiss(s.key, e)}
                />
              ))}
            </NotifSection>
          )}
        </div>
      )}
    </div>
  );
}

function fmtSchedTime(m) {
  const h = Math.floor(m/60), mm = m%60;
  const ampm = h >= 12 ? "pm" : "am";
  const h12 = h%12 === 0 ? 12 : h%12;
  return mm === 0 ? `${h12}${ampm}` : `${h12}:${String(mm).padStart(2,"0")}${ampm}`;
}

function NotifSection({ title, color, children }) {
  return (
    <div style={{ padding:"10px 0", borderBottom:`1px solid ${T.border}` }}>
      <p style={{ padding:"0 16px 6px", fontSize:9.5, color:color, fontWeight:800, letterSpacing:"0.12em" }}>{title}</p>
      <div>{children}</div>
    </div>
  );
}
function NotifItem({ color, title, sub, onClick, onDismiss }) {
  return (
    <div style={{
      display:"flex", alignItems:"flex-start", gap:9, padding:"7px 16px",
      transition:"background 0.1s",
    }}
    onMouseEnter={e => e.currentTarget.style.background = T.surface}
    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
    >
      <button onClick={onClick} style={{
        flex:1, background:"transparent", border:"none", cursor:"pointer",
        display:"flex", alignItems:"flex-start", gap:9, textAlign:"left",
        fontFamily:"inherit", padding:0, minWidth:0,
      }}>
        <span style={{ width:5, height:5, borderRadius:"50%", background:color, marginTop:6, flexShrink:0 }}></span>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontSize:12, color:T.ink, fontWeight:600, lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{title}</p>
          <p style={{ fontSize:10, color:T.muted, marginTop:1, letterSpacing:"0.04em", fontWeight:700 }}>{sub}</p>
        </div>
      </button>
      {onDismiss && (
        <button onClick={onDismiss} title="Dismiss" style={{
          width:18, height:18, borderRadius:3, background:"transparent",
          border:"none", color:T.faint, cursor:"pointer", padding:0, fontSize:13, lineHeight:1,
          display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
        }}
        onMouseEnter={e => { e.currentTarget.style.color = T.urgent; e.currentTarget.style.background = T.urgent + "15"; }}
        onMouseLeave={e => { e.currentTarget.style.color = T.faint; e.currentTarget.style.background = "transparent"; }}
        >×</button>
      )}
    </div>
  );
}

// ── Today account picker ──
function TodayPicker({ onSelect, avatars, onAvatarChange }) {
  const users = [
    { key: "vanja", name: "Vanja", role: "Manager · Strategy & Comms", color: T.vanja, soft: T.vanjaSoft, initial: "V" },
    { key: "oloka", name: "Oloka", role: "Content · Photo, Video, Social", color: T.oloka, soft: T.olokaSoft, initial: "O" },
  ];
  const vanjaRef = useRx(null);
  const olokaRef = useRx(null);
  const fileRefs = { vanja: vanjaRef, oloka: olokaRef };

  const handleUpload = (key, e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (onAvatarChange) onAvatarChange(key, ev.target.result);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  return (
    <div style={{ maxWidth: 480, margin: "60px auto 0", textAlign: "center" }}>
      <p style={{ color: T.gold, fontSize: 10, letterSpacing: "0.18em", fontWeight: 800, marginBottom: 10 }}>PRONTO HQ</p>
      <h1 style={{ fontFamily: "'ProximaNova Black', sans-serif", fontWeight: 900, fontSize: 38, color: T.heading, lineHeight: 1, marginBottom: 8 }}>Who's working today?</h1>
      <p style={{ color: T.muted, fontSize: 13, marginBottom: 36 }}>Select your account to see your personalised dashboard.</p>
      <div style={{ display: "flex", gap: 16 }}>
        {users.map(u => (
          <button key={u.key} onClick={() => onSelect(u.key)} style={{
            flex: 1, padding: "28px 20px", borderRadius: 12,
            background: T.cardBg, border: `2px solid ${T.border}`,
            cursor: "pointer", fontFamily: "inherit", textAlign: "center",
            transition: "border-color 0.15s", position: "relative",
          }}
            onMouseEnter={e => e.currentTarget.style.borderColor = u.color}
            onMouseLeave={e => e.currentTarget.style.borderColor = T.border}
          >
            <div style={{ position: "relative", width: 56, height: 56, margin: "0 auto 14px" }}>
              {(avatars && avatars[u.key]) ? (
                <img src={avatars[u.key]} alt={u.name} style={{
                  width: 56, height: 56, borderRadius: "50%", objectFit: "cover",
                  border: `2px solid ${u.color}`, display: "block",
                }} />
              ) : (
                <div style={{
                  width: 56, height: 56, borderRadius: "50%",
                  background: u.soft, border: `2px solid ${u.color}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "'ProximaNova Black', sans-serif", fontSize: 22, fontWeight: 900, color: u.color,
                }}>{u.initial}</div>
              )}
              <button
                onClick={e => { e.stopPropagation(); fileRefs[u.key].current && fileRefs[u.key].current.click(); }}
                title="Upload photo"
                style={{
                  position: "absolute", bottom: -2, right: -2,
                  width: 20, height: 20, borderRadius: "50%",
                  background: T.gold, border: `2px solid ${T.cardBg}`,
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 9, lineHeight: 1,
                }}
              >📷</button>
              <input ref={fileRefs[u.key]} type="file" accept="image/*" style={{ display: "none" }}
                onChange={e => handleUpload(u.key, e)} />
            </div>
            <p style={{ fontFamily: "'ProximaNova Black', sans-serif", fontWeight: 800, fontSize: 16, color: T.heading, marginBottom: 4 }}>{u.name}</p>
            <p style={{ fontSize: 11, color: T.muted }}>{u.role}</p>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Daily motivational quotes ──
const DAILY_QUOTES = [
  { q: "Great things are done by a series of small things brought together.", a: "Van Gogh" },
  { q: "The secret of getting ahead is getting started.", a: "Mark Twain" },
  { q: "Done is better than perfect.", a: "Sheryl Sandberg" },
  { q: "Focus on being productive instead of busy.", a: "Tim Ferriss" },
  { q: "Creativity is intelligence having fun.", a: "Albert Einstein" },
  { q: "Your time is limited, so don't waste it living someone else's life.", a: "Steve Jobs" },
  { q: "The best way to predict the future is to create it.", a: "Peter Drucker" },
  { q: "Small daily improvements over time lead to stunning results.", a: "Robin Sharma" },

function getDailyQuote() {
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return DAILY_QUOTES[dayOfYear % DAILY_QUOTES.length];
}

function getGreeting(name) {
  const h = new Date().getHours();
  const time = h < 12 ? "morning" : h < 17 ? "afternoon" : "evening";
  return `Good ${time}, ${name.charAt(0).toUpperCase() + name.slice(1)}`;
}

// ── Today dashboard ──
function TodayDashboard({ tasksByDate, schedule, content, staff, todayUser, avatars, onJumpTask, onJumpSchedule, onJumpContent, onJumpStaff }) {

  const dk = isoDate(todayD);
  const tasks = (tasksByDate[dk] || []).filter(t => t.category !== "Event" && t.owner !== "event");

  const done = tasks.filter(t => t.done && (!todayUser || t.owner === todayUser));
  const urgent = tasks.filter(t => !t.done && t.priority === "Urgent" && (!todayUser || t.owner === todayUser));
  const high = open.filter(t => t.priority === "High");

  const todaySched = schedule[dk] || { vanja: [], oloka: [] };

  const taskById = {};

  const post = (content[dk] || []);

      events.push({ name: s.name, kind: "Birthday", photo: s.photo });
    }
    const start = (s.started || "").match(/^\d{4}-(\d{2})-(\d{2})$/);
    if (start && parseInt(start[1]) === todayD.getMonth()+1 && parseInt(start[2]) === todayD.getDate()) {

            allBlocks.slice(0, 6).map((b, i) => {

// ── Subtasks UI inside an expanded task row ──
function SubtaskList({ task, onChangeSubtasks, isDropTarget }) {
  const subtasks = task.subtasks || [];
  const [adding, setAdding] = useSx(false);
  const [text, setText] = useSx("");
  const inputRef = useRx(null);
  useEx(() => { if (adding) inputRef.current && inputRef.current.focus(); }, [adding]);
  const add = () => {
    const t = text.trim();
    if (!t) { setAdding(false); return; }
    const id = Math.max(0, ...subtasks.map(s => s.id || 0)) + 1;
    onChangeSubtasks([...subtasks, { id, text: t, done: false }]);
    setText(""); setAdding(false);
  };
  const toggle = (id) => onChangeSubtasks(subtasks.map(s => s.id === id ? { ...s, done: !s.done } : s));
  const update = (id, v) => onChangeSubtasks(subtasks.map(s => s.id === id ? { ...s, text: v } : s));
  const del = (id) => onChangeSubtasks(subtasks.filter(s => s.id !== id));
  const moveSub = (fromIdx, toIdx) => {
    if (fromIdx === toIdx) return;
    const next = subtasks.slice();
    const [item] = next.splice(fromIdx, 1);
    next.splice(toIdx, 0, item);
    onChangeSubtasks(next);
  };
  const accent = task.owner === "vanja" ? T.vanja : T.oloka;

  return (
    <div style={{ marginTop:6, paddingLeft:22, paddingTop:4, borderTop:`1px dashed ${T.border}` }}>
      {isDropTarget && (
        <div style={{
          padding:"6px 9px", marginBottom:6,
          background: accent + "10", border:`1.5px dashed ${accent}`, borderRadius:4,
          color: accent, fontSize:10.5, fontWeight:800, letterSpacing:"0.08em",
        }}>↓ DROP HERE TO NEST AS SUBTASK</div>
      )}
      {subtasks.map((s, si) => (
        <div key={s.id}
          draggable={true}
          onDragStart={e => {
            try {
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("application/x-pronto-subtask", JSON.stringify({ parentId: task.id, idx: si }));
              e.dataTransfer.setData("text/plain", s.text);
            } catch (_) {}
          }}
          onDragOver={e => {
            const t = (e.dataTransfer.types || []);
            if (t.indexOf("application/x-pronto-subtask") !== -1) e.preventDefault();
          }}
          onDrop={e => {
            e.preventDefault(); e.stopPropagation();
            try {
              const raw = e.dataTransfer.getData("application/x-pronto-subtask");
              if (!raw) return;
              const data = JSON.parse(raw);
              if (data.parentId === task.id) moveSub(data.idx, si);
            } catch (_) {}
          }}
          style={{ display:"flex", alignItems:"center", gap:7, padding:"3px 0", cursor:"grab" }}>
          <span style={{ color:T.faint, fontSize:9, cursor:"grab" }}>⋮⋮</span>
          <button onClick={() => toggle(s.id)} style={{
            width:13, height:13, borderRadius:3, flexShrink:0,
            background: s.done ? accent : "transparent",
            border:`1.4px solid ${s.done ? accent : T.borderStrong}`,
            cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center",
            color:"#fff", fontSize:8, fontWeight:900,
          }}>{s.done && "✓"}</button>
          <div style={{ flex:1, fontSize:11.5, color: s.done ? T.muted : T.ink, lineHeight:1.4, textDecoration: s.done ? "line-through" : "none" }}>
            <EditableText value={s.text} onChange={v => update(s.id, v)} placeholder="Subtask"
              style={{ fontSize:11.5, color: s.done ? T.muted : T.ink, textDecoration: s.done ? "line-through" : "none" }}/>
          </div>
          <button onClick={() => del(s.id)} title="Remove" style={{
            background:"transparent", border:"none", color:T.faint, cursor:"pointer", padding:0, fontSize:12, lineHeight:1,
          }}
          onMouseEnter={e => e.currentTarget.style.color = T.urgent}
          onMouseLeave={e => e.currentTarget.style.color = T.faint}
          >×</button>
        </div>
      ))}
      {adding ? (
        <div style={{ display:"flex", gap:6, alignItems:"center", padding:"3px 0" }}>
          <input ref={inputRef} value={text} onChange={e => setText(e.target.value)}
            onKeyDown={e => {
              if (e.key === "Enter") {
                e.preventDefault();
                const t = text.trim();
                if (!t) { setAdding(false); return; }
                const id = Math.max(0, ...subtasks.map(s => s.id || 0)) + 1;
                onChangeSubtasks([...subtasks, { id, text: t, done: false }]);
                setText(""); // keep adding open so they can add several
                setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
              }
              if (e.key === "Escape") { setText(""); setAdding(false); }
            }}
            placeholder="Type subtask, press Enter to add another…"
            style={{ flex:1, background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:3, padding:"4px 8px", fontSize:11.5, fontFamily:"inherit", outline:"none" }}
          />
          <button onClick={add} style={{ background:accent, color:"#fff", border:"none", borderRadius:3, padding:"4px 10px", fontSize:9.5, fontWeight:800, cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.06em" }}>ADD</button>
          <button onClick={() => { setText(""); setAdding(false); }} style={{ background:"transparent", color:T.muted, border:`1px solid ${T.border}`, borderRadius:3, padding:"4px 8px", fontSize:9.5, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>DONE</button>
        </div>
      ) : (
        <button onClick={() => setAdding(true)} style={{
          background:"transparent", border:`1px dashed ${T.borderStrong}`,
          borderRadius:3, color:T.muted, fontSize:10.5, fontWeight:700,
          padding:"4px 10px", marginTop: subtasks.length ? 4 : 0,
          cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.04em",
          display:"flex", alignItems:"center", gap:5,
        }}
        onMouseEnter={e => { e.currentTarget.style.color = accent; e.currentTarget.style.borderColor = accent; }}
        onMouseLeave={e => { e.currentTarget.style.color = T.muted; e.currentTarget.style.borderColor = T.borderStrong; }}
        >
          <span style={{ fontSize:13, lineHeight:1 }}>+</span> ADD SUBTASK
        </button>
      )}
    </div>
  );
}

Object.assign(window, { SearchBar, NotificationsBell, TodayPicker, TodayDashboard, SubtaskList, getDailyQuote, getGreeting });

</script>

// ── Schedule view: drag tasks + breaks into a time-blocked planner ──
const { useState: useSh, useRef: useRh, useEffect: useEh, useMemo: useMh } = React;

const SCHED_START = 7;   // 7am
const SCHED_END   = 18;  // 6pm
const SLOT_MIN    = 15;  // 15-minute slots
const PX_PER_MIN  = 1.2; // 1.2px per minute = 72px per hour

function fmtTime(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const ampm = h >= 12 ? "pm" : "am";
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2,"0")}${ampm}`;
}

// Unique IDs
const newBreakId = () => `__brk_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const newQeId   = () => `__qe_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;

const AI_KEY_LS = "prontoHQ.aiKey";

// ─────────────────────────────────────────────────────────────────────────────
function AIPlanPanel({ dateKey, onAddBlocks }) {
  const [input, setInput] = useSh("");

  const saveKey = (k) => { setApiKey(k); try { localStorage.setItem(AI_KEY_LS, k); } catch(_) {} };

  const plan = async () => {
    if (!input.trim()) return;
    if (!apiKey.trim()) { setError("Add your Anthropic API key first (click the key icon)."); return; }
    setLoading(true); setError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "content-type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5",
          max_tokens: 1024,
          messages: [{
            role: "user",
            content: `You are a scheduling assistant for a small marketing team (Vanja = manager, Oloka = content creator).
Parse the following into a schedule of time blocks for today.
Work hours: 8am–5pm (startMin: 480=8am, 540=9am, 600=10am, 660=11am, 720=noon, 780=1pm, 840=2pm, 900=3pm, 960=4pm).
Default owner to "oloka" unless Vanja is mentioned. Estimate sensible durations.
Fit tasks logically — meetings at stated times, other tasks filling gaps.
Return ONLY a valid JSON array, no other text:
[{"task":"task name","startMin":480,"durationMin":60,"owner":"oloka"}]

User's plan: ${input.trim()}`
          }]
        })
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const raw = data.content?.[0]?.text || "";
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error("Could not parse schedule from AI response.");
      const blocks = JSON.parse(match[0]);

<script type="text/babel">
// ── Pronto HQ — Firebase Realtime Database live sync + presence ──
const { useState: useSy, useRef: useRy, useEffect: useEy } = React;

const FB_CONF_KEY    = "prontoHQ.fbConf.v1";
const FB_STATE_PATH  = "prontoHQ/state";
const FB_PRES_PATH   = "prontoHQ/presence";

const TAB_LABELS = {
  today:"Today", tasks:"Tasks", schedule:"Schedule", content:"Content",
  plan:"Plan 2026", team:"Team", resources:"Resources", chat:"Chat",
};

function loadFbConf() {
  try { return JSON.parse(localStorage.getItem(FB_CONF_KEY) || "null"); }
  catch (_) { return null; }
}
function saveFbConf(conf) {
  try { localStorage.setItem(FB_CONF_KEY, conf ? JSON.stringify(conf) : "null"); }
  catch (_) {}
}
function tryInitFb(conf) {
  if (!conf || !conf.apiKey || !conf.databaseURL) return null;
  try {
    try { return firebase.app("prontoHQ").database(); } catch (_) {}
    return firebase.initializeApp(conf, "prontoHQ").database();
  } catch (err) { console.error("Firebase init:", err); return null; }
}

// ── Presence avatars — shown in the app header ──
function PresenceAvatars({ users, myIdentity }) {
  const MEMBERS = [
    { id:"vanja", name:"Vanja", color:T.vanja },
    { id:"oloka", name:"Oloka", color:T.oloka },
  ];
  return (
    <div style={{ display:"flex", alignItems:"center", gap:4 }}>
      {MEMBERS.map(m => {
        const presence = users.find(u => u.id === m.id);
        const online   = !!presence;
        const isMe     = m.id === myIdentity;
        const tabLabel = presence ? TAB_LABELS[presence.tab] || presence.tab : null;
        return (
          <div key={m.id} style={{ position:"relative" }}
            title={online ? `${m.name} · ${tabLabel}${isMe ? " (you)" : ""}` : `${m.name} · offline`}
          >
            {/* Avatar circle */}
            <div style={{
              width:30, height:30, borderRadius:"50%",
              background: online ? m.color : "#E5E5E0",
              display:"flex", alignItems:"center", justifyContent:"center",
              color: online ? "#fff" : "#9AA0AE",
              fontSize:12, fontWeight:800, letterSpacing:"0.02em",
              border: isMe && online ? `2px solid ${m.color}` : "2px solid transparent",
              boxShadow: online ? `0 0 0 3px ${m.color}30` : "none",
              transition:"all 0.3s",
              cursor:"default",
              userSelect:"none",
            }}>
              {m.name[0]}
            </div>
            {/* Online green dot */}
            {online && (
              <span style={{
                position:"absolute", bottom:0, right:0,
                width:9, height:9, borderRadius:"50%",
                background:"#0E9F6E",
                border:"1.5px solid #fff",
                boxShadow:"0 0 0 1px #0E9F6E44",
              }}/>
            )}
            {/* Tab label chip — shown below avatar when online and not me */}
            {online && !isMe && tabLabel && (
              <div style={{
                position:"absolute", top:"calc(100% + 5px)", left:"50%",
                transform:"translateX(-50%)",
                background:m.color, color:"#fff",
                fontSize:8.5, fontWeight:800, letterSpacing:"0.06em",
                padding:"2px 5px", borderRadius:3,
                whiteSpace:"nowrap",
                pointerEvents:"none",
                zIndex:500,
              }}>
                {tabLabel.toUpperCase()}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── SyncButton ──
function SyncButton({ getState, applyState, syncRef, myIdentity, myColor, activeTab, onPresenceChange }) {
  const [open, setOpen]         = useSy(false);
  const [conf, setConf]         = useSy(loadFbConf);
  const [apiKey, setApiKey]     = useSy(() => loadFbConf()?.apiKey || "");
  const [dbUrl, setDbUrl]       = useSy(() => loadFbConf()?.databaseURL || "");
  const [status, setStatus]     = useSy("disconnected");
  const [lastSync, setLastSync] = useSy(null);
  const [errMsg, setErrMsg]     = useSy("");

  const dbRef         = useRy(null);
  const listenerRef   = useRy(null);
  const presListRef   = useRy(null);  // presence listener
  const myPresRef     = useRy(null);  // my own presence node
  const writeTimerRef = useRy(null);
  const pendingState  = useRy(null);
  const localWriteAt  = useRy(0);
  const popupRef      = useRy(null);

  useEy(() => {
    const h = e => { if (popupRef.current && !popupRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  // ── Connect / reconnect when conf changes ──
  useEy(() => {
    // Tear down
    if (listenerRef.current) { listenerRef.current.ref.off("value", listenerRef.current.handler); listenerRef.current = null; }
    if (presListRef.current) { presListRef.current.ref.off("value", presListRef.current.handler); presListRef.current = null; }
    if (myPresRef.current) { myPresRef.current.remove(); myPresRef.current = null; }
    if (!conf || !conf.apiKey || !conf.databaseURL) { setStatus("disconnected"); dbRef.current = null; if (onPresenceChange) onPresenceChange([]); return; }

    setStatus("connecting");
    const db = tryInitFb(conf);
    if (!db) { setStatus("error"); setErrMsg("Could not initialise Firebase. Check your config."); return; }
    dbRef.current = db;

    // Connection state
    db.ref(".info/connected").on("value", snap => setStatus(snap.val() ? "live" : "connecting"));

    // ── Presence: write mine, subscribe to all ──
    const identity = myIdentity || "vanja";
    const meRef = db.ref(`${FB_PRES_PATH}/${identity}`);
    myPresRef.current = meRef;
    meRef.set({ id: identity, name: identity === "vanja" ? "Vanja" : "Oloka", color: myColor || T.vanja, tab: activeTab || "tasks", online: true, lastSeen: Date.now() });
    meRef.onDisconnect().remove();

    const presRef = db.ref(FB_PRES_PATH);
    const presHandler = snap => {
      const data = snap.val() || {};
      if (onPresenceChange) onPresenceChange(Object.values(data));
    };
    presRef.on("value", presHandler);
    presListRef.current = { ref: presRef, handler: presHandler };

    // ── State sync: subscribe to changes from other sessions ──
    const stateRef = db.ref(FB_STATE_PATH);
    const stateHandler = snap => {
      const data = snap.val();
      if (!data) {
        if (pendingState.current && dbRef.current) {
          localWriteAt.current = Date.now();
          dbRef.current.ref(FB_STATE_PATH).set({ ...pendingState.current, _meta: { updatedAt: Date.now() } });
        }
        return;
      }
      if (Date.now() - localWriteAt.current < 3000) return;
      const { _meta, ...incoming } = data;
      applyState(incoming);
      setLastSync(new Date());
    };
    stateRef.on("value", stateHandler, err => { setStatus("error"); setErrMsg(err.message || "Firebase error."); });
    listenerRef.current = { ref: stateRef, handler: stateHandler };

    return () => {
      stateRef.off("value", stateHandler);
      presRef.off("value", presHandler);
      try { db.ref(".info/connected").off(); } catch (_) {}
    };
  }, [conf]);

  // ── Update my presence tab when the active tab changes ──
  useEy(() => {
    if (!myPresRef.current || !dbRef.current) return;
    myPresRef.current.update({ tab: activeTab, lastSeen: Date.now() });
  }, [activeTab]);

  // ── Re-write presence when identity changes (user switches Vanja↔Oloka) ──
  useEy(() => {
    if (!dbRef.current || !conf) return;
    // Remove old entry if it was a different key
    if (myPresRef.current) myPresRef.current.remove();
    const identity = myIdentity || "vanja";
    const meRef = dbRef.current.ref(`${FB_PRES_PATH}/${identity}`);
    myPresRef.current = meRef;
    meRef.set({ id: identity, name: identity === "vanja" ? "Vanja" : "Oloka", color: myColor || T.vanja, tab: activeTab || "tasks", online: true, lastSeen: Date.now() });
    meRef.onDisconnect().remove();
  }, [myIdentity]);

  // ── Expose scheduleWrite to app.jsx via syncRef ──
  useEy(() => {
    if (!syncRef) return;
    syncRef.current = {
      scheduleWrite(state) {
        pendingState.current = state;
        if (!dbRef.current) return;
        clearTimeout(writeTimerRef.current);
        writeTimerRef.current = setTimeout(() => {
          const s = pendingState.current;
          if (!s || !dbRef.current) return;
          localWriteAt.current = Date.now();
          dbRef.current.ref(FB_STATE_PATH)
            .set({ ...s, _meta: { updatedAt: Date.now() } })
            .then(() => setLastSync(new Date()))
            .catch(err => console.error("Firebase write:", err));
        }, 1500);
      }
    };
    return () => clearTimeout(writeTimerRef.current);
  });

  const connect = () => {
    const trimmed = { apiKey: apiKey.trim(), databaseURL: dbUrl.trim().replace(/\/$/, "") };
    if (!trimmed.apiKey || !trimmed.databaseURL) { setErrMsg("Both fields are required."); return; }
    setErrMsg("");
    saveFbConf(trimmed);
    setConf(trimmed);
  };

  const disconnect = () => {
    if (!confirm("Disconnect Firebase? The app will keep working locally but changes won't sync.")) return;
    if (listenerRef.current) { listenerRef.current.ref.off("value", listenerRef.current.handler); listenerRef.current = null; }
    if (presListRef.current) { presListRef.current.ref.off("value", presListRef.current.handler); presListRef.current = null; }
    if (myPresRef.current) { myPresRef.current.remove(); myPresRef.current = null; }
    try { if (dbRef.current) dbRef.current.ref(".info/connected").off(); } catch (_) {}
    dbRef.current = null;
    clearTimeout(writeTimerRef.current);
    saveFbConf(null);
    setConf(null); setApiKey(""); setDbUrl("");
    setStatus("disconnected"); setErrMsg("");
    if (syncRef) syncRef.current = null;
    if (onPresenceChange) onPresenceChange([]);
  };

  const dotColor = { live:"#0E9F6E", connecting:"#DC9F09", error:"#C8261A", disconnected:"#9AA0AE" }[status];
  const dotLabel = { live:"Live", connecting:"Connecting…", error:"Error", disconnected:"Offline" }[status];

  return (
    <div ref={popupRef} style={{ position:"relative" }}>
      <button onClick={() => setOpen(o => !o)} style={{
        padding:"7px 12px",
        background: status === "live" ? "#E4F7EF" : open ? "#14295A" : "transparent",
        border:`1px solid ${status === "live" ? "#0E9F6E44" : open ? "#14295A" : "#E5E5E0"}`,
        borderRadius:6, color: status === "live" ? "#0E9F6E" : open ? "#fff" : "#2A3147",
        fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.06em",
        display:"flex", alignItems:"center", gap:6, transition:"all 0.15s",
      }}
      onMouseEnter={e => { if (status !== "live" && !open) { e.currentTarget.style.borderColor="#14295A"; e.currentTarget.style.color="#14295A"; }}}
      onMouseLeave={e => { if (status !== "live" && !open) { e.currentTarget.style.borderColor="#E5E5E0"; e.currentTarget.style.color="#2A3147"; }}}
      >
        <span style={{ width:7, height:7, borderRadius:"50%", background:dotColor, flexShrink:0 }}></span>
        {status === "live" ? "LIVE" : "SYNC"}
      </button>

      {open && (
        <div style={{
          position:"absolute", top:"calc(100% + 6px)", right:0, zIndex:400,
          background:T.cardBg, border:"1px solid #D4D4CE", borderRadius:10,
          width:400, padding:18, boxShadow:"0 18px 40px rgba(15,27,58,0.18)",
        }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <p style={{ fontFamily:"'ProximaNova Black',sans-serif", fontWeight:800, fontSize:14, color:"#14295A", letterSpacing:"0.04em" }}>LIVE SYNC</p>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ width:8, height:8, borderRadius:"50%", background:dotColor }}></span>
              <span style={{ fontSize:11, fontWeight:700, color:dotColor }}>{dotLabel}</span>
            </div>
          </div>

          {status === "live" && (
            <div style={{ padding:"10px 12px", background:"#E4F7EF", border:"1px solid #0E9F6E22", borderRadius:7, marginBottom:14 }}>
              <p style={{ fontSize:12, color:"#0E9F6E", fontWeight:700, marginBottom:4 }}>Connected — changes sync automatically</p>
              <p style={{ fontSize:11, color:"#6B7280", marginBottom:8 }}>Every edit pushes within 1.5 s. Avatars in the header show who's online and which tab they're on.</p>
              {lastSync && <p style={{ fontSize:10.5, color:"#9AA0AE" }}>Last synced: {lastSync.toLocaleTimeString()}</p>}
              <button onClick={disconnect} style={{
                marginTop:10, fontSize:10, fontWeight:800, letterSpacing:"0.08em",
                background:"transparent", color:"#6B7280", border:"1px solid #E5E5E0",
                borderRadius:4, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit",
              }}>DISCONNECT</button>
            </div>
          )}

          {status === "connecting" && (
            <div style={{ padding:"10px 12px", background:"#FCF3DE", border:"1px solid #DC9F0933", borderRadius:7, marginBottom:14 }}>
              <p style={{ fontSize:12, color:"#DC9F09", fontWeight:700 }}>Connecting to Firebase…</p>
            </div>
          )}

          {(status === "disconnected" || status === "error") && (
            <>
              <p style={{ fontSize:11.5, color:"#6B7280", marginBottom:14, lineHeight:1.5 }}>
                Connect to <strong>Firebase Realtime Database</strong> — changes sync live, and you'll see who's online with which tab open.
              </p>
              <div style={{ marginBottom:14, padding:"12px 14px", background:"#FAFAF7", border:"1px solid #E5E5E0", borderRadius:7, fontSize:11, color:"#2A3147", lineHeight:1.6 }}>
                <p style={{ fontWeight:700, marginBottom:6, color:"#14295A" }}>One-time setup (~3 min, free):</p>
                <ol style={{ paddingLeft:18, margin:0, display:"flex", flexDirection:"column", gap:3 }}>
                  <li>Go to <strong>console.firebase.google.com</strong> → Add project</li>
                  <li>Build → <strong>Realtime Database</strong> → Create database → <em>Start in test mode</em></li>
                  <li>Project Settings → Your apps → <strong>&lt;/&gt;</strong> → Register web app</li>
                  <li>Copy <code style={{ background:"#F2F2EE", padding:"1px 4px", borderRadius:3 }}>apiKey</code> and <code style={{ background:"#F2F2EE", padding:"1px 4px", borderRadius:3 }}>databaseURL</code></li>
                  <li>Paste below → <strong>Connect</strong> — repeat on Oloka's browser with the same keys</li>
                </ol>
              </div>
              <label style={{ display:"block", fontSize:9.5, color:"#6B7280", fontWeight:800, letterSpacing:"0.12em", marginBottom:4 }}>API KEY</label>
              <input value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AIzaSy…"
                style={{ width:"100%", padding:"7px 10px", border:"1px solid #E5E5E0", borderRadius:5, fontSize:11, fontFamily:"monospace", outline:"none", marginBottom:10, color:"#0F1B3A" }}
              />
              <label style={{ display:"block", fontSize:9.5, color:"#6B7280", fontWeight:800, letterSpacing:"0.12em", marginBottom:4 }}>DATABASE URL</label>
              <input value={dbUrl} onChange={e => setDbUrl(e.target.value)} placeholder="https://your-project-default-rtdb.firebaseio.com"
                style={{ width:"100%", padding:"7px 10px", border:"1px solid #E5E5E0", borderRadius:5, fontSize:11, fontFamily:"monospace", outline:"none", marginBottom:14, color:"#0F1B3A" }}
              />
              <button onClick={connect} style={{
                width:"100%", padding:"10px 14px", background:"#14295A", color:"#fff",
                border:"none", borderRadius:6, fontSize:12, fontWeight:800,
                letterSpacing:"0.06em", cursor:"pointer", fontFamily:"inherit",
              }}>CONNECT</button>
              {errMsg && <p style={{ marginTop:8, fontSize:11, color:"#C8261A", fontWeight:600 }}>{errMsg}</p>}
            </>
          )}
          <p style={{ marginTop:14, fontSize:10, color:"#9AA0AE", lineHeight:1.4 }}>
            The database URL works like a password — keep it private. All data lives in your own Firebase project.
          </p>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { SyncButton, PresenceAvatars });

</script>
<script type="text/babel">
// ── Pronto HQ — view components (Day / Week / Month / Calendar / Chat) ──
const { useState: useStateV, useRef: useRefV, useEffect: useEffectV, useMemo: useMemoV } = React;

// ── ONGOING SECTION: recurring tasks, to-be-completed, ongoing jobs ──
function OngoingSection({ recurringTasks, setRecurringTasks, ongoingJobs, setOngoingJobs, toBeCompleted, setToBeCompleted, dayNotes, setDayNotes, dateKey, staff }) {
  const [addingRecurring, setAddingRecurring] = useStateV(false);
  const [newRecurText, setNewRecurText] = useStateV("");
  const [newRecurOwner, setNewRecurOwner] = useStateV("oloka");
  const [addingTBC, setAddingTBC] = useStateV(false);
  const [newTBCText, setNewTBCText] = useStateV("");
  const [newTBCOwner, setNewTBCOwner] = useStateV("oloka");
  const [addingOJ, setAddingOJ] = useStateV(false);
  const [newOJText, setNewOJText] = useStateV("");
  const [newOJOwner, setNewOJOwner] = useStateV("oloka");

  // Completion state for today
  const recurringDone = ((dayNotes || {})[dateKey] || {}).recurringDone || {};
  const ojDone = ((dayNotes || {})[dateKey] || {}).ojDone || {};
  const setRecDone = (id, val) => setDayNotes(prev => {
    const day = prev[dateKey] || {};
    return { ...prev, [dateKey]: { ...day, recurringDone: { ...(day.recurringDone||{}), [id]: val } } };
  });
  const setOJDone = (id, val) => setDayNotes(prev => {
    const day = prev[dateKey] || {};
    return { ...prev, [dateKey]: { ...day, ojDone: { ...(day.ojDone||{}), [id]: val } } };
  });

  // Staff birthdays + start dates for today (annual, MM-DD match)
  const todayMMDD = dateKey ? dateKey.slice(5) : "";
  const staffEvents = [];
  for (const s of staff || []) {
    if (!s.name) continue;
    const dobMatch = (s.dob || "").match(/^\d{4}-(\d{2}-\d{2})$/);
    if (dobMatch && dobMatch[1] === todayMMDD) {
      staffEvents.push({ id:"bday_"+s.name, text:`🎂 ${s.name.split(" ")[0]}'s Birthday`, kind:"birthday" });
    }
    const startMatch = (s.started || "").match(/^\d{4}-(\d{2}-\d{2})$/);
    if (startMatch && startMatch[1] === todayMMDD) {
      const startYear = parseInt((s.started||"").slice(0,4));
      const thisYear = new Date().getFullYear();
      const years = thisYear - startYear;
      staffEvents.push({ id:"anni_"+s.name, text:`🎉 ${s.name.split(" ")[0]}'s ${years > 0 ? years+"yr " : ""}Work Anniversary`, kind:"anniversary" });
    }
  }

  const ORANGE = "#F97316";

  const OrangeCheckbox = ({ done, onToggle }) => (
    <button onClick={onToggle} style={{
      width:18, height:18, borderRadius:4, flexShrink:0,
      border:`2px solid ${ORANGE}`,
      background: done ? ORANGE : "transparent",
      cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
      color:"#fff", fontSize:10, fontWeight:900, transition:"all 0.15s",
    }}>{done ? "✓" : ""}</button>
  );

  const ownerToggle = (val, setVal) => (
    <div style={{ display:"flex", gap:0, border:`1px solid ${T.border}`, borderRadius:5, overflow:"hidden", flexShrink:0 }}>
      {[{k:"oloka",l:"O"},{k:"vanja",l:"V"}].map(o => (
        <button key={o.k} onClick={() => setVal(o.k)} style={{
          padding:"3px 8px", fontSize:10, fontWeight:800,
          background: val===o.k ? (o.k==="oloka" ? T.oloka : T.vanja) : T.surface,
          color: val===o.k ? "#fff" : T.muted,
          border:"none", cursor:"pointer", fontFamily:"inherit",
        }}>{o.l}</button>
      ))}
    </div>
  );

  return (
    <div style={{ marginTop:24, display:"flex", flexDirection:"column", gap:16 }}>

      {/* ── RECURRING DAILY TASKS ── */}
      <div style={{ border:`1px solid ${ORANGE}33`, borderLeft:`3px solid ${ORANGE}`, borderRadius:8, overflow:"hidden", background:T.cardBg }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:T.surface, borderBottom:`1px solid ${T.border}` }}>
          <div>
            <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.12em", color:ORANGE }}>🔁 RECURRING DAILY</span>
            <span style={{ fontSize:10, color:T.muted, marginLeft:8 }}>Resets each day · delete to remove permanently</span>
          </div>
          <button onClick={() => setAddingRecurring(true)} style={{ padding:"3px 10px", background:"transparent", border:`1px solid ${ORANGE}`, borderRadius:5, color:ORANGE, fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>+ Add</button>
        </div>
        <div style={{ padding:"8px 14px", display:"flex", flexDirection:"column", gap:6 }}>
          {/* Staff events for today */}
          {staffEvents.map(ev => (
            <div key={ev.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
              <OrangeCheckbox done={!!recurringDone[ev.id]} onToggle={() => setRecDone(ev.id, !recurringDone[ev.id])} />
              <span style={{ fontSize:12, color:T.ink, flex:1 }}>{ev.text}</span>
              <span style={{ fontSize:9, color:ORANGE, fontWeight:700, letterSpacing:"0.06em" }}>TEAM</span>
            </div>
          ))}
          {/* User-added recurring tasks */}
          {recurringTasks.map(rt => (
            <div key={rt.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
              <OrangeCheckbox done={!!recurringDone[rt.id]} onToggle={() => setRecDone(rt.id, !recurringDone[rt.id])} />
              <span style={{ fontSize:12, color: recurringDone[rt.id] ? T.muted : T.ink, flex:1, textDecoration: recurringDone[rt.id] ? "line-through" : "none" }}>{rt.text}</span>
              <span style={{ fontSize:9, color: rt.owner==="oloka" ? T.oloka : T.vanja, fontWeight:800 }}>{rt.owner==="oloka"?"O":"V"}</span>
              <button onClick={() => setRecurringTasks(prev => prev.filter(x => x.id !== rt.id))} style={{ background:"none", border:"none", color:T.faint, cursor:"pointer", fontSize:14, lineHeight:1, padding:"0 2px" }} title="Remove permanently">×</button>
            </div>
          ))}
          {recurringTasks.length === 0 && staffEvents.length === 0 && (
            <p style={{ fontSize:10, color:T.faint, fontStyle:"italic" }}>No recurring tasks for today</p>
          )}
          {/* Add form */}
          {addingRecurring && (
            <div style={{ display:"flex", gap:6, alignItems:"center", marginTop:4 }}>
              {ownerToggle(newRecurOwner, setNewRecurOwner)}
              <input autoFocus value={newRecurText} onChange={e => setNewRecurText(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter" && newRecurText.trim()) { setRecurringTasks(prev => [...prev, { id:"rt_"+Date.now(), text:newRecurText.trim(), owner:newRecurOwner }]); setNewRecurText(""); setAddingRecurring(false); } if(e.key==="Escape") { setAddingRecurring(false); setNewRecurText(""); }}}
                placeholder="Recurring task…"
                style={{ flex:1, padding:"5px 8px", border:`1px solid ${T.border}`, borderRadius:5, fontSize:11, color:T.ink, background:T.bg, outline:"none", fontFamily:"inherit" }}
              />
              <button onClick={() => { if(newRecurText.trim()) { setRecurringTasks(prev => [...prev, { id:"rt_"+Date.now(), text:newRecurText.trim(), owner:newRecurOwner }]); setNewRecurText(""); setAddingRecurring(false); }}} style={{ padding:"5px 10px", background:ORANGE, border:"none", borderRadius:5, color:"#fff", fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>Add</button>
              <button onClick={() => { setAddingRecurring(false); setNewRecurText(""); }} style={{ padding:"5px 8px", background:T.surface2, border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
            </div>
          )}
        </div>
      </div>

      {/* ── TO BE COMPLETED ── */}
      <div style={{ border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden", background:T.cardBg }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:T.surface, borderBottom: toBeCompleted.length > 0 ? `1px solid ${T.border}` : "none" }}>
          <div>
            <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.12em", color:T.muted }}>📋 TO BE COMPLETED</span>
            <span style={{ fontSize:10, color:T.faint, marginLeft:8 }}>Unscheduled tasks waiting to be assigned a day</span>
          </div>
          <button onClick={() => setAddingTBC(true)} style={{ padding:"3px 10px", background:"transparent", border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>+ Add</button>
        </div>
        {(toBeCompleted.length > 0 || addingTBC) && (
          <div style={{ padding:"8px 14px", display:"flex", flexDirection:"column", gap:6 }}>
            {toBeCompleted.map(t => (
              <div key={t.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:18, height:18, borderRadius:4, border:`1.5px solid ${T.border}`, flexShrink:0 }} />
                <span style={{ fontSize:12, color:T.ink, flex:1 }}>{t.text}</span>
                <span style={{ fontSize:9, color: t.owner==="oloka" ? T.oloka : T.vanja, fontWeight:800 }}>{t.owner==="oloka"?"O":"V"}</span>
                <button onClick={() => setToBeCompleted(prev => prev.filter(x => x.id !== t.id))} style={{ background:"none", border:"none", color:T.faint, cursor:"pointer", fontSize:14, lineHeight:1, padding:"0 2px" }}>×</button>
              </div>
            ))}
            {toBeCompleted.length === 0 && !addingTBC && (
              <p style={{ fontSize:10, color:T.faint, fontStyle:"italic" }}>No tasks waiting</p>
            )}
            {addingTBC && (
              <div style={{ display:"flex", gap:6, alignItems:"center", marginTop:4 }}>
                {ownerToggle(newTBCOwner, setNewTBCOwner)}
                <input autoFocus value={newTBCText} onChange={e => setNewTBCText(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter" && newTBCText.trim()) { setToBeCompleted(prev => [...prev, { id:"tbc_"+Date.now(), text:newTBCText.trim(), owner:newTBCOwner }]); setNewTBCText(""); setAddingTBC(false); } if(e.key==="Escape") { setAddingTBC(false); setNewTBCText(""); }}}
                  placeholder="Task to be completed…"
                  style={{ flex:1, padding:"5px 8px", border:`1px solid ${T.border}`, borderRadius:5, fontSize:11, color:T.ink, background:T.bg, outline:"none", fontFamily:"inherit" }}
                />
                <button onClick={() => { if(newTBCText.trim()) { setToBeCompleted(prev => [...prev, { id:"tbc_"+Date.now(), text:newTBCText.trim(), owner:newTBCOwner }]); setNewTBCText(""); setAddingTBC(false); }}} style={{ padding:"5px 10px", background:T.navy, border:"none", borderRadius:5, color:"#fff", fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>Add</button>
                <button onClick={() => { setAddingTBC(false); setNewTBCText(""); }} style={{ padding:"5px 8px", background:T.surface2, border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── ONGOING JOBS ── */}
      <div style={{ border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden", background:T.cardBg, marginBottom:8 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:T.surface, borderBottom: ongoingJobs.length > 0 ? `1px solid ${T.border}` : "none" }}>
          <div>
            <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.12em", color:T.muted }}>🔧 ONGOING JOBS</span>
            <span style={{ fontSize:10, color:T.faint, marginLeft:8 }}>Long-running tasks · tick to track daily · delete to remove</span>
          </div>
          <button onClick={() => setAddingOJ(true)} style={{ padding:"3px 10px", background:"transparent", border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>+ Add</button>
        </div>
        {(ongoingJobs.length > 0 || addingOJ) && (
          <div style={{ padding:"8px 14px", display:"flex", flexDirection:"column", gap:6 }}>
            {ongoingJobs.map(oj => (
              <div key={oj.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <OrangeCheckbox done={!!ojDone[oj.id]} onToggle={() => setOJDone(oj.id, !ojDone[oj.id])} />
                <span style={{ fontSize:12, color: ojDone[oj.id] ? T.muted : T.ink, flex:1, textDecoration: ojDone[oj.id] ? "line-through" : "none" }}>{oj.text}</span>
                <span style={{ fontSize:9, color: oj.owner==="oloka" ? T.oloka : T.vanja, fontWeight:800 }}>{oj.owner==="oloka"?"O":"V"}</span>
                <button onClick={() => setOngoingJobs(prev => prev.filter(x => x.id !== oj.id))} style={{ background:"none", border:"none", color:T.faint, cursor:"pointer", fontSize:14, lineHeight:1, padding:"0 2px" }} title="Remove permanently">×</button>
              </div>
            ))}
            {addingOJ && (
              <div style={{ display:"flex", gap:6, alignItems:"center", marginTop:4 }}>
                {ownerToggle(newOJOwner, setNewOJOwner)}
                <input autoFocus value={newOJText} onChange={e => setNewOJText(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter" && newOJText.trim()) { setOngoingJobs(prev => [...prev, { id:"oj_"+Date.now(), text:newOJText.trim(), owner:newOJOwner }]); setNewOJText(""); setAddingOJ(false); } if(e.key==="Escape") { setAddingOJ(false); setNewOJText(""); }}}
                  placeholder="Ongoing job…"
                  style={{ flex:1, padding:"5px 8px", border:`1px solid ${T.border}`, borderRadius:5, fontSize:11, color:T.ink, background:T.bg, outline:"none", fontFamily:"inherit" }}
                />
                <button onClick={() => { if(newOJText.trim()) { setOngoingJobs(prev => [...prev, { id:"oj_"+Date.now(), text:newOJText.trim(), owner:newOJOwner }]); setNewOJText(""); setAddingOJ(false); }}} style={{ padding:"5px 10px", background:T.navy, border:"none", borderRadius:5, color:"#fff", fontSize:10, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>Add</button>
                <button onClick={() => { setAddingOJ(false); setNewOJText(""); }} style={{ padding:"5px 8px", background:T.surface2, border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
              </div>
            )}
          </div>
        )}
      </div>

    </div>
  );
}

// ── DAY VIEW: split columns Vanja / Oloka for selected date ──
function DayView({ selDate, tasksByDate, onToggle, onChangePriority, onChangeOwner, onChangeText, onChangeCategory, onChangeSubtasks, onConvertToSubtask, onChangeNotes, onAdd, onDelete, isMobile, staff, dayNotes, setDayNotes, recurringTasks, setRecurringTasks, ongoingJobs, setOngoingJobs, toBeCompleted, setToBeCompleted }) {
  const [filter, setFilter] = useStateV("All");
  const [visibleCols, setVisibleCols] = useStateV(["vanja","oloka","ongoing"]);
  const toggleCol = (c) => setVisibleCols(prev => prev.includes(c) ? (prev.length > 1 ? prev.filter(x=>x!==c) : prev) : [...prev, c]);
  const dateKey = isoDate(selDate);
  const dayTasks = tasksByDate[dateKey] || [];
  const isWeekend = selDate.getDay() === 0 || selDate.getDay() === 6;

  const events = dayTasks.filter(t => t.category === "Event" || t.owner === "event");
  const realTasks = dayTasks.filter(t => !(t.category === "Event" || t.owner === "event"));

  const byOwner = {
    vanja: realTasks.filter(t => t.owner === "vanja"),
    oloka: realTasks.filter(t => t.owner === "oloka"),
  };

  const total = realTasks.length;
  const done = realTasks.filter(t => t.done).length;
  const urgent = realTasks.filter(t => t.priority === "Urgent" && !t.done).length;

  const fBtn = (v, label, dot) => (
    <button key={v} onClick={() => setFilter(v)} style={{
      display:"flex", alignItems:"center", gap:6,
      padding:"6px 14px", borderRadius:6,
      background: filter===v ? T.navy : T.cardBg,
      border:`1px solid ${filter===v ? T.navy : T.border}`,
      color: filter===v ? "#fff" : T.text,
      fontSize:11.5, fontWeight: filter===v ? 700 : 600, cursor:"pointer",
      fontFamily:"inherit", letterSpacing:"0.04em", textTransform:"uppercase",
    }}>
      {dot && <span style={{ width:6, height:6, borderRadius:"50%", background:dot }}></span>}
      {label}
    </button>
  );

  return (
    <div>
      {/* Stats + filter row */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18, flexWrap:"wrap", gap:14 }}>
        <div style={{ display:"flex", gap:8 }}>
          {fBtn("All", "All Tasks")}
          {fBtn("Urgent", "Urgent", T.urgent)}
          {fBtn("Incomplete", "Incomplete")}
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {[
            { label:"TOTAL", val:total, color:T.ink },
            { label:"DONE", val:done, color:T.oloka },
            { label:"URGENT", val:urgent, color:T.urgent },
          ].map(s => (
            <div key={s.label} style={{
              padding:"7px 16px", background:T.cardBg, border:`1px solid ${T.border}`,
              borderRadius:6, textAlign:"left", minWidth:72,
              display:"flex", alignItems:"baseline", gap:8,
            }}>
              <span style={{ fontSize:22, fontWeight:800, color:s.color, fontFamily:"'ProximaNova Black', sans-serif", lineHeight:1 }}>{s.val}</span>
              <span style={{ fontSize:9.5, color:T.muted, letterSpacing:"0.12em", fontWeight:700 }}>{s.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Column visibility toggles */}
      <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
        {[
          { key:"vanja",   label:"VANJA",   color:T.vanja },
          { key:"oloka",   label:"OLOKA",   color:T.oloka },
          { key:"ongoing", label:"ONGOING", color:"#F97316" },
        ].map(({ key, label, color }) => (
          <button key={key} onClick={() => toggleCol(key)} style={{
            padding:"5px 14px", borderRadius:6,
            background: visibleCols.includes(key) ? color : T.surface,
            border:`1.5px solid ${visibleCols.includes(key) ? color : T.border}`,
            color: visibleCols.includes(key) ? "#fff" : T.muted,
            fontSize:10, fontWeight:800, letterSpacing:"0.1em",
            cursor:"pointer", fontFamily:"inherit", transition:"all 0.15s",
          }}>{label}</button>
        ))}
      </div>

      {/* Events row */}
      {events.length > 0 && (
        <div style={{ marginBottom:14, padding:"10px 14px", background:T.surface, border:`1px solid ${T.border}`, borderLeft:`3px solid ${T.gold}`, borderRadius:6, display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          <span style={{ fontSize:10, fontWeight:800, color:T.gold, letterSpacing:"0.12em" }}>EVENTS</span>
          {events.map((e, i) => (
            <span key={i} style={{ fontSize:13, color:T.ink, fontWeight:500 }}>
              {e.text}{i < events.length-1 ? " · " : ""}
            </span>
          ))}
        </div>
      )}

      {/* Weekend notice */}
      {isWeekend && realTasks.length === 0 && (
        <div style={{ padding:"40px 20px", background:T.surface, border:`1px dashed ${T.border}`, borderRadius:8, textAlign:"center" }}>
          <p style={{ fontFamily:"'ProximaNova Black', sans-serif", fontSize:22, color:T.heading, marginBottom:4, letterSpacing:"-0.01em" }}>WEEKEND</p>
          <p style={{ color:T.muted, fontSize:13 }}>No scheduled tasks. Mon–Fri 7am–5pm.</p>
        </div>
      )}

      {/* Two columns */}
      {(() => {
        const showV = visibleCols.includes("vanja");
        const showO = visibleCols.includes("oloka");
        const cols = [showV, showO].filter(Boolean).length;
        const gridCols = isMobile ? "1fr" : (cols === 2 ? "1fr 1fr" : "1fr");
        return (
          <div style={{ display:"grid", gridTemplateColumns: gridCols, gap:22 }}>
            {showV && <PersonColumn name="Vanja" role="Manager · Strategy & Comms" owner="vanja" accent={T.vanja} accentSoft={T.vanjaSoft}
              tasks={byOwner.vanja} filter={filter} dateKey={dateKey}
              onToggle={onToggle} onChangePriority={onChangePriority} onChangeOwner={onChangeOwner}
              onChangeText={onChangeText} onChangeCategory={onChangeCategory} onChangeSubtasks={onChangeSubtasks}
              onConvertToSubtask={onConvertToSubtask} onChangeNotes={onChangeNotes}
              onAdd={onAdd} onDelete={onDelete}
            />}
            {showO && <PersonColumn name="Oloka" role="Content · Photo, Video, Social" owner="oloka" accent={T.oloka} accentSoft={T.olokaSoft}
              tasks={byOwner.oloka} filter={filter} dateKey={dateKey}
              onToggle={onToggle} onChangePriority={onChangePriority} onChangeOwner={onChangeOwner}
              onChangeText={onChangeText} onChangeCategory={onChangeCategory} onChangeSubtasks={onChangeSubtasks}
              onConvertToSubtask={onConvertToSubtask} onChangeNotes={onChangeNotes}
              onAdd={onAdd} onDelete={onDelete}
            />}
          </div>
        );
      })()}
      {visibleCols.includes("ongoing") && (
        <OngoingSection
          recurringTasks={recurringTasks} setRecurringTasks={setRecurringTasks}
          ongoingJobs={ongoingJobs} setOngoingJobs={setOngoingJobs}
          toBeCompleted={toBeCompleted} setToBeCompleted={setToBeCompleted}
          dayNotes={dayNotes} setDayNotes={setDayNotes}
          dateKey={dateKey} staff={staff || []}
        />
      )}
    </div>
  );
}

function PersonColumn({ name, role, owner, accent, accentSoft, tasks, filter, dateKey, onToggle, onChangePriority, onChangeOwner, onChangeText, onChangeCategory, onChangeSubtasks, onConvertToSubtask, onChangeNotes, onAdd, onDelete }) {
  const [adding, setAdding] = useStateV(false);
  const [text, setText] = useStateV("");
  const [pri, setPri] = useStateV("Normal");
  const availCats = window.prontoCats || CATS;
  const [cat, setCat] = useStateV(availCats[0] || "Social Post");
  const inputRef = useRefV(null);
  useEffectV(() => { if (adding) inputRef.current?.focus(); }, [adding]);

  const PRI_ORDER = { Urgent: 0, High: 1, Normal: 2, Low: 3 };
  const sortByPriority = (arr) => [...arr].sort((a, b) => {
    // done tasks always go to bottom
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (PRI_ORDER[a.priority] ?? 99) - (PRI_ORDER[b.priority] ?? 99);
  });

  const filtered = filter === "All" ? tasks : filter === "Urgent" ? tasks.filter(t => t.priority === "Urgent") : tasks.filter(t => !t.done);
  const visible = sortByPriority(filtered);
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;

  const submit = () => {
    if (!text.trim()) { setAdding(false); return; }
    const isEvent = cat === "Event";
    onAdd(dateKey, {
      text: text.trim(),
      priority: isEvent ? "Normal" : pri,
      category: cat,
      done: false,
      owner: isEvent ? "event" : owner,
    });
    setText(""); setPri("Normal"); setCat((window.prontoCats || CATS)[0] || "Social Post"); setAdding(false);
  };
  const selStyle = {
    background:T.cardBg, border:`1px solid ${T.border}`,
    color:T.text, borderRadius:5, fontSize:11, padding:"5px 8px", cursor:"pointer", fontFamily:"inherit",
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, paddingBottom:12, borderBottom:`1px solid ${T.border}` }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{
            width:38, height:38, borderRadius:"50%",
            background:accentSoft, border:`1.5px solid ${accent}`,
            display:"flex", alignItems:"center", justifyContent:"center",
            color:accent, fontWeight:800, fontSize:16, fontFamily:"'ProximaNova Black', sans-serif",
          }}>{name[0]}</div>
          <div>
            <p style={{ margin:0, color:T.ink, fontWeight:800, fontSize:15, fontFamily:"'ProximaNova Black', sans-serif", letterSpacing:"0.01em", textTransform:"uppercase" }}>{name}</p>
            <p style={{ margin:"1px 0 0", color:T.muted, fontSize:10.5 }}>{role}</p>
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <p style={{ margin:"0 0 4px", color:accent, fontSize:12.5, fontWeight:800, fontFamily:"'ProximaNova Black', sans-serif" }}>{done}/{tasks.length} · {pct}%</p>
          <div style={{ width:84, height:4, background:T.surface2, borderRadius:2 }}>
            <div style={{ width:`${pct}%`, height:"100%", background:accent, borderRadius:2, transition:"width 0.4s" }}></div>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
        {visible.map(t => (
          <TaskRow key={t.id} task={t} dateKey={dateKey}
            onToggle={() => onToggle(t.id)}
            onChangePriority={(p) => onChangePriority(t.id, p)}
            onChangeOwner={(o) => onChangeOwner(t.id, o)}
            onChangeText={onChangeText ? (v) => onChangeText(t.id, v) : undefined}
            onChangeCategory={onChangeCategory ? (c) => onChangeCategory(t.id, c) : undefined}
            onChangeSubtasks={onChangeSubtasks ? (subs) => onChangeSubtasks(t.id, subs) : undefined}
            onConvertToSubtask={onConvertToSubtask}
            onChangeNotes={onChangeNotes ? (notes) => onChangeNotes(t.id, notes) : undefined}
            onDelete={onDelete ? () => onDelete(dateKey, t.id) : undefined}
          />
        ))}
        {visible.length === 0 && (
          <p style={{ color:T.faint, fontSize:12, textAlign:"center", padding:"14px 0", fontStyle:"italic" }}>
            {tasks.length === 0 ? "Nothing assigned." : "Nothing matches this filter."}
          </p>
        )}
      </div>

      <div style={{ marginTop:10 }}>
        {adding ? (
          <div style={{ padding:"10px 12px", background:T.cardBg, border:`1px dashed ${cat === "Event" ? T.gold : accent}`, borderRadius:6 }}>
            <input ref={inputRef} value={text} onChange={e => setText(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter") submit(); if(e.key==="Escape") setAdding(false); }}
              placeholder={cat === "Event" ? "Event title (e.g. Smiths Birthday)…" : "What needs doing?"}
              style={{ width:"100%", background:"transparent", border:"none", color:T.ink, fontSize:13, outline:"none", marginBottom:8, fontFamily:"inherit" }}
            />
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              {cat !== "Event" && (
                <select value={pri} onChange={e => setPri(e.target.value)} style={selStyle}>
                  {["Urgent","High","Normal","Low"].map(p => <option key={p}>{p}</option>)}
                </select>
              )}
              <select value={cat} onChange={e => setCat(e.target.value)} style={selStyle}>
                {(window.prontoCats || CATS).map(c => <option key={c}>{c}</option>)}
              </select>
              <button onClick={submit} style={{ background: cat === "Event" ? T.gold : accent, border:"none", borderRadius:5, color:"#fff", fontSize:11, fontWeight:800, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.06em" }}>{cat === "Event" ? "ADD EVENT" : "ADD"}</button>
              <button onClick={() => setAdding(false)} style={{ background:"transparent", border:`1px solid ${T.border}`, borderRadius:5, color:T.muted, fontSize:11, padding:"6px 11px", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setAdding(true)} style={{
            width:"100%", padding:"9px", background:"transparent",
            border:`1px dashed ${T.borderStrong}`, borderRadius:6,
            color:T.muted, fontSize:12, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:6,
            fontFamily:"inherit", transition:"all 0.15s",
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = accent; e.currentTarget.style.color = accent; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = T.borderStrong; e.currentTarget.style.color = T.muted; }}
          >
            <span style={{ fontSize:15, lineHeight:1 }}>+</span> Add task or event for {name}
          </button>
        )}
      </div>
    </div>
  );
}

// ── WEEK VIEW: Mon-Fri grid ──
function WeekView({ selDate, tasksByDate, content, onPickDate, onToggle, onShift, onMoveTask, onAdd }) {
  const monday = startOfWeek(selDate);
  const days = Array.from({ length: 5 }, (_, i) => addDays(monday, i));
  const todayD = today(); // app's "today"
  const [drag, setDrag] = React.useState(null);  // { id, fromDate }
  const [hoverDate, setHoverDate] = React.useState(null);
  const [quickAddDay, setQuickAddDay] = React.useState(null); // dateKey for new task
  const [quickAddText, setQuickAddText] = React.useState("");
  const [quickAddOwner, setQuickAddOwner] = React.useState("oloka");

  const handleDragOver = (e, dk) => {
    if (!drag || drag.fromDate === dk) return;
    e.preventDefault();
    try { e.dataTransfer.dropEffect = "move"; } catch (_) {}
    if (hoverDate !== dk) setHoverDate(dk);
  };
  const handleDragLeave = (e, dk) => { if (hoverDate === dk) setHoverDate(null); };
  const handleDrop = (e, dk) => {
    e.preventDefault();
    if (!drag) return;
    if (drag.fromDate !== dk && onMoveTask) onMoveTask(drag.id, drag.fromDate, dk);
    setDrag(null); setHoverDate(null);
  };

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:14 }}>
        {days.map(d => {
          const dk = isoDate(d);
          const tasks = (tasksByDate[dk] || []).filter(t => t.category !== "Event" && t.owner !== "event");
          const events = (tasksByDate[dk] || []).filter(t => t.category === "Event" || t.owner === "event");
          const total = tasks.length;
          const done = tasks.filter(t => t.done).length;
          const urgent = tasks.filter(t => t.priority === "Urgent" && !t.done).length;
          const isToday = sameDay(d, todayD);
          const isSel = sameDay(d, selDate);
          const post = content && content[dk] ? content[dk][0] : null;
          const v = tasks.filter(t => t.owner === "vanja");
          const o = tasks.filter(t => t.owner === "oloka");
          return (
            <div key={dk} onClick={() => onPickDate(d)}
              onDragOver={(e) => handleDragOver(e, dk)}
              onDragLeave={(e) => handleDragLeave(e, dk)}
              onDrop={(e) => handleDrop(e, dk)}
              style={{
                background: hoverDate === dk ? T.surface : T.cardBg,
                border:`1px solid ${hoverDate === dk ? T.gold : (isSel ? T.navy : T.border)}`,
                borderTop:`3px solid ${isToday ? T.gold : isSel ? T.navy : T.borderStrong}`,
                borderRadius:8, padding:"14px 14px 16px",
                cursor:"pointer", transition:"all 0.15s",
                minHeight:340,
                display:"flex", flexDirection:"column",
                outline: hoverDate === dk ? `2px dashed ${T.gold}` : "none",
                outlineOffset: hoverDate === dk ? "-4px" : "0",
              }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                <div>
                  <p style={{ color: isToday ? T.gold : T.muted, fontSize:10, fontWeight:800, letterSpacing:"0.14em", marginBottom:2 }}>{DAYS[d.getDay()].toUpperCase()}</p>
                  <p style={{ fontSize:30, fontWeight:800, fontFamily:"'ProximaNova Black', sans-serif", color: isToday ? T.gold : T.ink, lineHeight:1, letterSpacing:"-0.02em" }}>{d.getDate()}</p>
                </div>
                {isToday && <span style={{ background:T.gold, color:"#fff", fontSize:8.5, fontWeight:800, padding:"3px 7px", borderRadius:3, letterSpacing:"0.1em" }}>TODAY</span>}
                <button onClick={(e) => { e.stopPropagation(); setQuickAddDay(dk); setQuickAddText(""); }} style={{
                  marginLeft:"auto", width:22, height:22, borderRadius:"50%",
                  background:"transparent", border:`1px solid ${T.border}`,
                  color:T.muted, cursor:"pointer", fontSize:16, lineHeight:1,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  flexShrink:0,
                }}>+</button>
              </div>

              {post && post.title && (() => {
                const tc = CONTENT_TYPES[post.type] || CONTENT_TYPES.Post;
                return (
                  <div style={{ padding:"6px 9px", background:tc.soft, borderLeft:`2.5px solid ${tc.color}`, borderRadius:4, marginBottom:10 }}>
                    <p style={{ fontSize:9, fontWeight:800, color:tc.color, letterSpacing:"0.12em", marginBottom:2 }}>{post.type.toUpperCase()}</p>
                    <p style={{ fontSize:11.5, color:T.ink, lineHeight:1.35, fontWeight:600 }}>{post.title}</p>
                  </div>
                );
              })()}

              {events.length > 0 && events.map((e,i) => (
                <p key={i} style={{ fontSize:11, color:T.gold, marginBottom:4, fontWeight:600 }}>• {e.text}</p>
              ))}

              <div style={{ flex:1, display:"flex", flexDirection:"column", gap:5, marginTop:4 }}>
                {[...v, ...o].map(t => {
                  const ac = t.owner === "vanja" ? T.vanja : T.oloka;
                  const isDragging = drag && drag.id === t.id;
                  return (
                    <div key={t.id}
                      draggable={true}
                      onDragStart={(e) => {
                        e.stopPropagation();
                        setDrag({ id: t.id, fromDate: dk });
                        try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", String(t.id)); } catch (_) {}
                      }}
                      onDragEnd={() => { setDrag(null); setHoverDate(null); }}
                      onClick={(e) => e.stopPropagation()}
                      style={{
                        display:"flex", alignItems:"flex-start", gap:6,
                        cursor: "grab",
                        padding:"2px 4px", borderRadius:3,
                        marginLeft:-4, marginRight:-4,
                        opacity: isDragging ? 0.4 : 1,
                        transition:"opacity 0.1s, background 0.1s",
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = T.surface}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                    >
                      <span style={{ color:T.faint, fontSize:11, lineHeight:1.35, flexShrink:0, marginTop:1, cursor:"grab" }} title="Drag to move">⋮⋮</span>
                      <span style={{ width:3, height:3, borderRadius:"50%", background: t.done ? T.faint : ac, marginTop:7, flexShrink:0 }}></span>
                      <p style={{ fontSize:11, color: t.done ? T.faint : T.text, textDecoration: t.done ? "line-through" : "none", lineHeight:1.35, flex:1, wordBreak:"break-word" }}>{t.text}</p>
                    </div>
                  );
                })}
                {tasks.length === 0 && (
                  <p style={{ fontSize:11, color:T.faint, fontStyle:"italic" }}>Nothing scheduled.</p>
                )}
              </div>

              {total > 0 && (
                <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:10.5 }}>
                  <span style={{ color:T.muted, letterSpacing:"0.04em", fontWeight:600 }}>{done}/{total} done</span>
                  {urgent > 0 && <span style={{ color:T.urgent, fontWeight:800, letterSpacing:"0.04em" }}>{urgent} URGENT</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {quickAddDay && (
        <div onClick={() => setQuickAddDay(null)} style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(15,27,58,0.35)", display:"flex", alignItems:"center", justifyContent:"center", padding:"32px 16px" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.cardBg, borderRadius:10, width:"100%", maxWidth:380, boxShadow:"0 20px 50px rgba(15,27,58,0.3)", borderTop:`3px solid ${T.navy}` }}>
            <div style={{ padding:"14px 18px 12px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <p style={{ fontSize:10, fontWeight:800, letterSpacing:"0.12em", color:T.navy }}>ADD TASK · {quickAddDay}</p>
              <button onClick={() => setQuickAddDay(null)} style={{ background:"transparent", border:"none", color:T.muted, cursor:"pointer", fontSize:18 }}>×</button>
            </div>
            <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:10 }}>
              <input autoFocus value={quickAddText} onChange={e => setQuickAddText(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter" && quickAddText.trim()) { onAdd && onAdd(quickAddDay, { text: quickAddText.trim(), owner: quickAddOwner }); setQuickAddDay(null); } if(e.key==="Escape") setQuickAddDay(null); }}
                placeholder="Task name…" style={{ width:"100%", padding:"9px 10px", border:`1px solid ${T.border}`, borderRadius:5, fontSize:13, color:T.ink, background:T.bg, fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
              <div style={{ display:"flex", gap:6 }}>
                {[{k:"oloka",l:"OLOKA",c:T.oloka},{k:"vanja",l:"VANJA",c:T.vanja}].map(u => (
                  <button key={u.k} onClick={() => setQuickAddOwner(u.k)} style={{ flex:1, padding:"7px", fontSize:10, fontWeight:800, border:"none", borderRadius:5, cursor:"pointer", fontFamily:"inherit", background: quickAddOwner===u.k ? u.c : T.surface, color: quickAddOwner===u.k ? "#fff" : T.muted }}>{u.l}</button>
                ))}
              </div>
            </div>
            <div style={{ padding:"10px 18px 14px", display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={() => setQuickAddDay(null)} style={{ padding:"8px 16px", background:T.surface, border:`1px solid ${T.border}`, borderRadius:6, color:T.muted, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
              <button onClick={() => { if(quickAddText.trim()) { onAdd && onAdd(quickAddDay, { text: quickAddText.trim(), owner: quickAddOwner }); setQuickAddDay(null); }}} style={{ padding:"8px 20px", background:T.navy, border:"none", borderRadius:6, color:"#fff", fontSize:11, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>Add Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MONTH VIEW: full calendar grid ──
function MonthView({ selDate, tasksByDate, content, onPickDate, onMoveTask, onAdd }) {
  // Show the selected month
  const year = selDate.getFullYear(), month = selDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const start = startOfWeek(firstOfMonth);
  const weeks = [];
  let cur = new Date(start);
  for (let w = 0; w < 6; w++) {
    const row = [];
    for (let d = 0; d < 7; d++) {
      row.push(new Date(cur));
      cur = addDays(cur, 1);
    }
    weeks.push(row);
  }
  const todayD = today();
  const [drag, setDrag] = React.useState(null);
  const [hoverDate, setHoverDate] = React.useState(null);
  const [quickAddDay, setQuickAddDay] = React.useState(null); // dateKey for new task
  const [quickAddText, setQuickAddText] = React.useState("");
  const [quickAddOwner, setQuickAddOwner] = React.useState("oloka");

  return (
    <div style={{ background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden" }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", borderBottom:`1px solid ${T.border}`, background:T.surface }}>
        {DAYS.map((d, i) => (
          <div key={d} style={{
            padding:"10px 12px", textAlign:"left",
            color: (i===0||i===6) ? T.faint : T.muted,
            fontSize:10, fontWeight:800, letterSpacing:"0.14em",
            borderRight: i < 6 ? `1px solid ${T.border}` : "none",
          }}>{d.toUpperCase()}</div>
        ))}
      </div>
      <div>
        {weeks.map((row, wi) => (
          <div key={wi} style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", borderBottom: wi < 5 ? `1px solid ${T.border}` : "none" }}>
            {row.map((d, di) => {
              const inMonth = d.getMonth() === month;
              const isWeekend = di === 0 || di === 6;
              const dk = isoDate(d);
              const all = tasksByDate[dk] || [];
              const tasks = all.filter(t => t.category !== "Event" && t.owner !== "event");
              const events = all.filter(t => t.category === "Event" || t.owner === "event");
              const total = tasks.length;
              const done = tasks.filter(t => t.done).length;
              const urgent = tasks.filter(t => t.priority === "Urgent" && !t.done).length;
              const post = content && content[dk] ? content[dk][0] : null;
              const isToday = sameDay(d, todayD);
              const isSel = sameDay(d, selDate);
              const v = tasks.filter(t => t.owner === "vanja").length;
              const o = tasks.filter(t => t.owner === "oloka").length;
              return (
                <div key={di} onClick={() => onPickDate(d)}
                  onDragOver={inMonth ? (e) => {
                    if (!drag || drag.fromDate === dk) return;
                    e.preventDefault();
                    try { e.dataTransfer.dropEffect = "move"; } catch (_) {}
                    if (hoverDate !== dk) setHoverDate(dk);
                  } : undefined}
                  onDragLeave={inMonth ? () => { if (hoverDate === dk) setHoverDate(null); } : undefined}
                  onDrop={inMonth ? (e) => {
                    e.preventDefault();
                    if (drag && drag.fromDate !== dk && onMoveTask) onMoveTask(drag.id, drag.fromDate, dk);
                    setDrag(null); setHoverDate(null);
                  } : undefined}
                  style={{
                    minHeight:110, padding:"7px 9px 9px",
                    background: hoverDate === dk && inMonth ? T.surface : (!inMonth ? T.surface2 : isWeekend ? T.surface : T.cardBg),
                    borderRight: di < 6 ? `1px solid ${T.border}` : "none",
                    cursor: inMonth ? "pointer" : "default",
                    position:"relative",
                    opacity: inMonth ? 1 : 0.55,
                    outline: hoverDate === dk && inMonth ? `2px dashed ${T.gold}` : (isSel ? `2px solid ${T.navy}` : "none"),
                    outlineOffset: (hoverDate === dk || isSel) ? "-2px" : "0",
                    transition:"background 0.15s",
                    display:"flex", flexDirection:"column",
                  }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                    <span style={{
                      fontSize: isToday ? 17 : 14, fontWeight:800,
                      fontFamily:"'ProximaNova Black', sans-serif",
                      color: isToday ? T.gold : isWeekend ? T.faint : T.ink,
                      letterSpacing:"-0.01em",
                      lineHeight:1,
                    }}>
                      {d.getDate()}
                      {isToday && <span style={{ display:"inline-block", marginLeft:6, width:5, height:5, background:T.gold, borderRadius:"50%", verticalAlign:"middle" }}></span>}
                    </span>
                    <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                      {urgent > 0 && <span style={{ background:T.urgent, color:"#fff", fontSize:9, fontWeight:800, padding:"1px 5px", borderRadius:3, letterSpacing:"0.04em" }}>{urgent}</span>}
                      {total > 0 && <span style={{ fontSize:9, color: done === total ? T.oloka : T.muted, fontWeight:700, letterSpacing:"0.04em" }}>{done}/{total}</span>}
                      {inMonth && <button onClick={(e) => { e.stopPropagation(); setQuickAddDay(dk); setQuickAddText(""); }} style={{
                        width:18, height:18, borderRadius:"50%",
                        background:"transparent", border:`1px solid ${T.border}`,
                        color:T.muted, cursor:"pointer", fontSize:13, lineHeight:1,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        flexShrink:0, padding:0,
                      }}>+</button>}
                    </div>
                  </div>
                  {post && post.title && (() => {
                    const tc = CONTENT_TYPES[post.type] || CONTENT_TYPES.Post;
                    return (
                      <p style={{ fontSize:9.5, color:T.ink, lineHeight:1.3, fontWeight:700, marginBottom:5, paddingLeft:5, borderLeft:`2px solid ${tc.color}` }}>
                        {post.title.length > 32 ? post.title.slice(0,32)+"…" : post.title}
                      </p>
                    );
                  })()}
                  {events.length > 0 && events.map((e,i) => (
                    <p key={"e"+i} style={{ fontSize:9.5, color:T.gold, fontWeight:600, marginBottom:2, paddingLeft:5, borderLeft:`2px solid ${T.gold}` }}>
                      {e.text}
                    </p>
                  ))}
                  {/* every task, color-dotted by owner */}
                  <div style={{ display:"flex", flexDirection:"column", gap:1.5, marginTop:events.length > 0 ? 3 : 0 }}>
                    {tasks.map(t => {
                      const ac = t.owner === "vanja" ? T.vanja : T.oloka;
                      const isDragging = drag && drag.id === t.id;
                      return (
                        <div key={t.id}
                          draggable={true}
                          onDragStart={(e) => {
                            e.stopPropagation();
                            setDrag({ id: t.id, fromDate: dk });
                            try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", String(t.id)); } catch (_) {}
                          }}
                          onDragEnd={() => { setDrag(null); setHoverDate(null); }}
                          onClick={(e) => e.stopPropagation()}
                          style={{
                            display:"flex", alignItems:"flex-start", gap:4,
                            cursor:"grab", opacity: isDragging ? 0.4 : 1,
                            padding:"1px 2px", borderRadius:2,
                          }}
                        >
                          <span style={{ width:3, height:3, borderRadius:"50%", background: t.done ? T.faint : ac, marginTop:5, flexShrink:0 }}></span>
                          <p style={{
                            fontSize:9.5,
                            color: t.done ? T.faint : T.text,
                            textDecoration: t.done ? "line-through" : "none",
                            lineHeight:1.3, fontWeight:500, wordBreak:"break-word", flex:1, minWidth:0,
                          }}>{t.text}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      {quickAddDay && (
        <div onClick={() => setQuickAddDay(null)} style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(15,27,58,0.35)", display:"flex", alignItems:"center", justifyContent:"center", padding:"32px 16px" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.cardBg, borderRadius:10, width:"100%", maxWidth:380, boxShadow:"0 20px 50px rgba(15,27,58,0.3)", borderTop:`3px solid ${T.navy}` }}>
            <div style={{ padding:"14px 18px 12px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <p style={{ fontSize:10, fontWeight:800, letterSpacing:"0.12em", color:T.navy }}>ADD TASK · {quickAddDay}</p>
              <button onClick={() => setQuickAddDay(null)} style={{ background:"transparent", border:"none", color:T.muted, cursor:"pointer", fontSize:18 }}>×</button>
            </div>
            <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:10 }}>
              <input autoFocus value={quickAddText} onChange={e => setQuickAddText(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter" && quickAddText.trim()) { onAdd && onAdd(quickAddDay, { text: quickAddText.trim(), owner: quickAddOwner }); setQuickAddDay(null); } if(e.key==="Escape") setQuickAddDay(null); }}
                placeholder="Task name…" style={{ width:"100%", padding:"9px 10px", border:`1px solid ${T.border}`, borderRadius:5, fontSize:13, color:T.ink, background:T.bg, fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
              <div style={{ display:"flex", gap:6 }}>
                {[{k:"oloka",l:"OLOKA",c:T.oloka},{k:"vanja",l:"VANJA",c:T.vanja}].map(u => (
                  <button key={u.k} onClick={() => setQuickAddOwner(u.k)} style={{ flex:1, padding:"7px", fontSize:10, fontWeight:800, border:"none", borderRadius:5, cursor:"pointer", fontFamily:"inherit", background: quickAddOwner===u.k ? u.c : T.surface, color: quickAddOwner===u.k ? "#fff" : T.muted }}>{u.l}</button>
                ))}
              </div>
            </div>
            <div style={{ padding:"10px 18px 14px", display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={() => setQuickAddDay(null)} style={{ padding:"8px 16px", background:T.surface, border:`1px solid ${T.border}`, borderRadius:6, color:T.muted, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
              <button onClick={() => { if(quickAddText.trim()) { onAdd && onAdd(quickAddDay, { text: quickAddText.trim(), owner: quickAddOwner }); setQuickAddDay(null); }}} style={{ padding:"8px 20px", background:T.navy, border:"none", borderRadius:6, color:"#fff", fontSize:11, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>Add Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
